  - title: 'Seizure Prediction Using Convolutional Neural Networks and Sequence Transformer Networks'
    group: 'Chen R. & Parhi K.K., University of Minnesota'
    group_en: 'Chen R. & Parhi K.K., University of Minnesota'
    year: 2021
    tag: 'INTL'
