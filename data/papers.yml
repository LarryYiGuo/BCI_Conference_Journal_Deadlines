    desc_en: 'A wavelet-based Transformer that maps rs-fMRI to the frequency domain and uses real/imaginary cross-attention to diagnose ASD; representative of frequency-domain brain-signal modeling.'
  - title: 'GBT: Geometric-oriented Brain Transformer for Autism Diagnosis'
    group: '香港中文大学 CUHK-AIM 组(袁奕萱组)'
    group_en: 'CUHK, AIM Group (Yixuan Yuan)'
    year: 2024
    tag: 'CN'
    desc: '从几何视角建模 ROI 脑连接组,提出几何导向的脑 Transformer 做自闭症诊断,是华人组的代表性脑网络工作。'
    desc_en: 'Models the ROI brain connectome from a geometric perspective with a geometry-oriented brain Transformer for autism diagnosis.'
  - title: 'Multi-order Simplex-based Graph Neural Network for Brain Network Analysis'
    group: '浦项科技大学 / 北卡大学(Won Hwa Kim、Guorong Wu)'
    group_en: 'POSTECH / UNC (Won Hwa Kim, Guorong Wu)'
    year: 2024
    tag: 'INTL'
    desc: '用多阶单纯形(simplex)建模脑网络高阶交互的 GNN,超越成对边连接做脑网络分析。'
    desc_en: 'A multi-order simplex-based GNN that captures higher-order interactions in brain networks beyond pairwise edges.'
  - title: 'DTCA: Dual-Branch Transformer with Cross-Attention for EEG and Eye Movement Data Fusion'
    group: '张晓珊/张姝组, 西北工业大学'
    group_en: 'Zhang Xiaoshan / Zhang Shu Lab, Northwestern Polytechnical University'
