    group_en: 'Huang Zhongyu / Du Changde / He Lab, CASIA'
    year: 2022
    tag: 'CN'
    desc: '用情绪-脑区二部图结构建模 fMRI 神经响应与情绪的关系, 实现视觉诱发情绪的图解码, 优于传统 GCN/脑网络模型, 是何晖光组 fMRI 神经解码代表作。'
    desc_en: 'Models the relationship between fMRI responses and emotions with an emotion-region bipartite graph for graph-based decoding of visually evoked emotion, outperforming conventional GCN and brain-network models; a representative fMRI neural-decoding work from He Hui-Guang''s group.'

embc27:
  - title: 'Transformer Convolutional Neural Networks for Automated Artifact Detection in Scalp EEG'
