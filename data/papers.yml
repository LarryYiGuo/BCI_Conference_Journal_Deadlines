    desc_en: 'A dual-branch Transformer with cross-attention fusing EEG and eye-movement data for brain-state classification, reaching SOTA (99%+) on SEED/SEED-IV/SEED-V.'
  - title: 'Beyond the Snapshot: Brain Tokenized Graph Transformer for Longitudinal Brain Functional Connectome Embedding'
    group: '新加坡国立大学(周思谦 Juan Helen Zhou 组)'
    group_en: 'National University of Singapore (Juan Helen Zhou Lab)'
    year: 2023
    tag: 'INTL'
    desc: '把脑功能连接组做 token 化的图 Transformer,用于阿尔茨海默病进程的纵向 fMRI 连接组嵌入与预测。'
    desc_en: 'A tokenized graph Transformer for longitudinal brain functional connectome embedding, applied to the Alzheimer''s continuum on fMRI.'
  - title: 'Community-Aware Transformer for Autism Prediction in fMRI Connectome'
    group: '英属哥伦比亚大学 UBC-TEA 组'
    group_en: 'University of British Columbia (UBC-TEA)'
    year: 2023
    tag: 'INTL'
    desc: 'Com-BrainTF,层次化 local-global Transformer,显式建模 ROI 社团内/社团间结构做自闭症 fMRI 连接组预测。'
    desc_en: 'Com-BrainTF, a hierarchical local-global Transformer modeling intra/inter-community ROI structure for ASD prediction on fMRI connectomes.'
  - title: 'Path-Based Heterogeneous Brain Transformer Network for Resting-State Functional Connectivity Analysis'
    group: '海外医学影像组(Springer LNCS MICCAI 2023)'
    group_en: 'International medical imaging group (MICCAI 2023, LNCS)'
    year: 2023
    tag: 'INTL'
    desc: '基于路径的异质脑 Transformer 网络,用于静息态功能连接分析,是 MICCAI 2023 脑网络 Transformer 代表作之一。'
    desc_en: 'A path-based heterogeneous brain Transformer for resting-state functional connectivity analysis.'
  - title: 'FE-STGNN: Spatio-Temporal Graph Neural Network with Functional and Effective Connectivity Fusion for MCI Diagnosis'
    group: 'MICCAI 2023 录用 (脑网络组)'
    group_en: 'Accepted at MICCAI 2023 (brain-network group)'
    year: 2023
    tag: 'INTL'
    desc: '用 cross-attention 融合静息态 fMRI 的功能连接(FC)与有效连接(EC), 构建时空图神经网络做轻度认知障碍(MCI)诊断。'
    desc_en: 'Fuses functional (FC) and effective (EC) connectivity from resting-state fMRI via cross-attention in a spatio-temporal graph neural network for mild cognitive impairment (MCI) diagnosis.'
