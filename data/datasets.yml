# BCI Datasets · 公开数据集数据文件 / data file
# ─────────────────────────────────────────────────────────────
# 字段 / fields:
#   name / link        数据集名 / 原始源链接
#   year               发布年份
#   paradigm           范式: MI 运动想象 | VIS 视觉解码 | EMO 情绪 |
#                            SPEECH 想象语音 | COG 认知负荷 | SLEEP 睡眠静息 | SPELL ERP/SSVEP
#   modality           采集模态: EEG | EEG+fNIRS | EEG+fMRI | EEG+周边 | ECoG | PSG | fNIRS
#   n                  被试数(规模指标)
#   channels           通道 + 系统;trials 每被试试次
#   cohort             healthy 健康 | stroke 中风 | clinical 其他临床
#   era                时代: W1 (2008–2017 经典) | W2 (2017–2022 深度) | W3 (2022–2026 表征对齐)
#   invasive / consumer  侵入式 / 消费级硬件标记
#   tags               关键标签;note / note_en 客观说明(中 / 英)
# ─────────────────────────────────────────────────────────────
# 整理自 Larry 的「BCI 公开数据集参考手册 v1.3」,按 Paradigm × Modality × Era 三轴。
# 链接由 check_dataset_links.py 每周做健康检查。
# ─────────────────────────────────────────────────────────────

