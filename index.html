<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCI Conference Deadlines · BCI 会议截稿日历</title>
<meta name="description" content="Deadline tracker for BCI/EEG/brain-signal researchers. 面向 BCI/EEG/脑信号研究者的会议报名与截稿追踪。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf8; --bg2:#f0f0ee;
  --ink:#2C2C2A; --ink-dim:#5F5E5A; --ink-muted:#8a8a84; --hair:#e8e6df; --line-soft:#d6d5cf;
  --orange:#D85A30; --blue:#4F7396; --red:#C0473F; --green:#1D9E75;
  /* theme accents — high-sat, shaded by rank */
  --t-algo:#2563EB; --t-vis:#7C3AED; --t-med:#D97706; --t-neuro:#DC2626;
  --serif:'Noto Serif SC',Georgia,serif;
  --sans:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1000px;margin:0 auto;padding:0 2.4rem}

/* ── nav ── */
.nav{position:sticky;top:0;z-index:50;background:rgba(250,250,248,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--hair)}
.nav-in{max-width:1000px;margin:0 auto;padding:.7rem 2.4rem}
.nav-row1{display:flex;gap:1.2rem;align-items:center}
.brand{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);text-decoration:none;font-weight:500}
.brand em{font-style:normal;color:var(--orange)}
.modetabs{display:inline-flex;border:1px solid var(--hair);margin-left:.4rem}
.mtab{font-family:var(--mono);font-size:.66rem;letter-spacing:.04em;color:var(--ink-dim);background:none;border:none;padding:.3rem .7rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.mtab+.mtab{border-left:1px solid var(--hair)}
.mtab:hover{color:var(--ink)}
.mtab.on{background:var(--ink);color:var(--bg)}
.nav .spacer{flex:1}
.search{font-family:var(--mono);font-size:.7rem;width:min(220px,32vw);background:var(--bg);border:1px solid var(--hair);padding:.32rem .6rem;color:var(--ink);outline:none;transition:border .15s}
.search:focus{border-color:var(--ink-muted)}
.search::placeholder{color:var(--ink-muted)}
.tool{font-family:var(--mono);font-size:.68rem;letter-spacing:.04em;color:var(--ink-dim);text-decoration:none;background:none;border:1px solid var(--hair);padding:.3rem .65rem;cursor:pointer;transition:all .15s}
.tool:hover{border-color:var(--ink-muted);color:var(--ink)}
.tool.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* per-venue recent papers */
.papers{margin-top:.8rem;padding-top:.7rem;border-top:1px dashed var(--line-soft)}
.papers-head{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:.5rem}
.paper-row{padding:.45rem 0;border-top:1px solid var(--hair)}
.paper-row:first-of-type{border-top:none}
.paper-line{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap}
.paper-row .pt{font-size:.84rem;font-weight:500;text-decoration:none;line-height:1.4;color:var(--ink)}
.paper-row .pt:hover{color:var(--blue);border-bottom:1px solid var(--blue)}
.paper-row .py{font-family:var(--mono);font-size:.62rem;color:var(--ink-muted)}
.paper-row .ptag{font-family:var(--mono);font-size:.56rem;letter-spacing:.04em;text-transform:uppercase;padding:.02rem .3rem;border-radius:2px;border:1px solid var(--hair);color:var(--ink-muted)}
.paper-row .ptag.spot{color:var(--red);border-color:var(--red)}
.paper-row .ptag.cn{color:var(--blue);border-color:rgba(79,115,150,.5)}
.paper-row .pg{font-size:.72rem;color:var(--ink-muted)}
.paper-row .pd{font-size:.74rem;color:var(--ink-dim);line-height:1.55;margin-top:.2rem}
.nav-row2{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-top:.6rem}
.nav-row2 .lbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-right:.3rem}
.fbtn{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--mono);font-size:.66rem;letter-spacing:.02em;color:var(--ink-dim);background:none;border:1px solid var(--hair);padding:.26rem .6rem .26rem .4rem;cursor:pointer;transition:all .15s}
.fbtn .fic{width:16px;height:16px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;background:var(--c,var(--ink-muted));border-radius:3px}
.fbtn .fic svg{width:11px;height:11px;fill:#fff}
.fbtn:hover{border-color:var(--ink-muted)}
.fbtn.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.fbtn.on .fic{background:var(--c)}
.fbtn.all{padding:.26rem .7rem}

/* ── hero ── */
.hero{padding:5rem 0 2.5rem}
.kicker{font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:2rem}
.hero h1{font-family:var(--serif);font-weight:900;font-size:clamp(2.3rem,6vw,4.2rem);line-height:1.1;letter-spacing:-.02em}
.hero h1 em{font-style:normal;color:var(--orange)}
.hero .lede{font-size:1rem;color:var(--ink-dim);max-width:50ch;margin-top:1.8rem;font-weight:300}

/* stats */
.stats{display:flex;flex-wrap:wrap;gap:3.4rem;padding:2.6rem 0;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);margin-top:2.4rem}
.stat .n{font-family:var(--serif);font-weight:900;font-size:2.9rem;line-height:1;letter-spacing:-.02em;color:var(--orange)}
.stat .n.sm{font-size:2rem}
.stat .l{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-top:.6rem}

/* group heads */
.group-head{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted);margin:3.4rem 0 .4rem;display:flex;align-items:baseline;gap:.7rem}
.group-head .cnt{color:var(--orange)}

/* ── conference rows ── */
.evt{display:grid;grid-template-columns:158px 1fr;gap:1.8rem;padding:1.7rem 0;border-bottom:1px solid var(--hair);align-items:start}
.evt.past{opacity:.5}

.evt-left{font-family:var(--mono);min-width:0}
.evt-theme{display:flex;align-items:center;gap:.45rem;font-size:.64rem;letter-spacing:.04em;color:var(--ink-dim)}
.evt-theme .dot{width:8px;height:8px;border-radius:50%;background:var(--tc,var(--ink-muted));flex:0 0 auto}
.cd-block{margin-top:1rem}
.cd-block:first-child{margin-top:0}
.cd-lbl{display:flex;align-items:center;gap:.4rem;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted)}
.cd-lbl::before{content:'';width:6px;height:6px;border-radius:50%;flex:0 0 auto;background:var(--ink-muted)}
.cd{display:block;font-size:1.05rem;font-weight:500;font-variant-numeric:tabular-nums;line-height:1.3;margin-top:.2rem;white-space:nowrap}
.cd.reg{color:var(--blue)} .cd.sub{color:var(--red)}
.cd-block:has(.cd.reg) .cd-lbl::before{background:var(--blue)}
.cd-block:has(.cd.sub) .cd-lbl::before{background:var(--red)}
.cd.tbd,.cd.over{color:var(--ink-muted);font-size:.92rem;font-weight:400}

.evt-right{min-width:0}
.evt-name{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}
.evt-ic{width:22px;height:22px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;background:var(--tc,var(--ink));border-radius:3px}
.evt-ic svg{width:14px;height:14px;fill:#fff}
.evt-name .nm{font-family:var(--serif);font-weight:700;font-size:1.28rem;letter-spacing:-.01em;text-decoration:none;line-height:1.2}
.evt-name .nm:hover{color:var(--orange)}
.evt-name .yr{color:var(--ink-muted);font-weight:400}
.evt-name .est{font-family:var(--mono);font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-muted);border:1px solid var(--hair);padding:.05rem .35rem;border-radius:2px}
.evt-full{font-size:.82rem;color:var(--ink-muted);margin-top:.3rem;line-height:1.5}
.evt-metrics{font-family:var(--mono);font-size:.64rem;letter-spacing:.03em;color:var(--ink-dim);margin-top:.45rem}
.evt-metrics .sep{color:var(--hair);margin:0 .5rem}
.evt-metrics .trk{color:var(--ink-muted)}

/* timeline */
.tl{margin:1rem 0 .9rem;max-width:520px}
.tl .track{position:relative;height:3px;background:var(--hair)}
.tl .fill{position:absolute;top:0;bottom:0;left:0;background:#d8d6cf}
.tl .seg{position:absolute;top:0;bottom:0}
.tl .seg.reg{background:var(--blue);opacity:.6}
.tl .seg.sub{background:var(--red);opacity:.6}
.tl .mk{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 0 1px var(--ink-muted)}
.tl .mk.reg{background:var(--blue)} .tl .mk.sub{background:var(--red)}
.tl .now{position:absolute;top:-6px;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid var(--ink)}
.tl .lbls{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.56rem;color:var(--ink-muted);margin-top:.35rem;letter-spacing:.03em}

/* deadline lines */
.dls{display:flex;flex-direction:column;gap:.4rem;margin:.2rem 0 .7rem}
.dl-row{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;font-family:var(--mono);font-size:.74rem;line-height:1.5}
.dl-row .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.dl-row.reg .dot{background:var(--blue)} .dl-row.sub .dot{background:var(--red)}
.dl-row .k{font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;font-weight:500;min-width:8.5em}
.dl-row.reg .k{color:var(--blue)} .dl-row.sub .k{color:var(--red)}
.dl-row.done .k,.dl-row.done .v{color:var(--ink-muted)}
.dl-row .v{color:var(--ink)}
.dl-row .cal{display:flex;gap:.3rem;margin-left:.2rem}
.calbtn{font-family:var(--mono);font-size:.56rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-muted);border:1px solid var(--hair);padding:.04rem .35rem;text-decoration:none;transition:all .15s}
.calbtn:hover{border-color:var(--ink);color:var(--ink)}

.evt-meta{font-size:.82rem;color:var(--ink-dim);margin-top:.2rem}
.evt-meta .k{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);margin-right:.35rem}
.evt-meta a.place{text-decoration:none;border-bottom:1px solid var(--hair)}
.evt-meta a.place:hover{border-color:var(--ink)}
.evt-meta a.fmt{
  display:inline-flex;align-items:center;gap:.3rem;
  font-family:var(--mono);font-size:.66rem;letter-spacing:.02em;
  color:var(--ink-dim);background:rgba(0,0,0,.035);
  border:1px solid var(--line-soft);
  padding:.12rem .5rem;border-radius:4px;text-decoration:none;white-space:nowrap;
  transition:all .15s;margin-left:.15rem;
}
.evt-meta a.fmt:hover{background:rgba(0,0,0,.06);border-color:var(--ink-muted);color:var(--ink)}
.evt-meta .sep{color:var(--hair);margin:0 .7rem}
.evt-note{font-size:.78rem;color:var(--ink-muted);margin-top:.5rem;line-height:1.6;max-width:62ch}

/* dataset rows */
.ds-n{margin-top:1rem}
.ds-n .v{font-family:var(--serif);font-weight:900;font-size:1.7rem;line-height:1;letter-spacing:-.02em;color:var(--tc,var(--ink))}
.ds-n .k{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-top:.4rem}
.ds-era{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;color:var(--ink-muted);margin-top:.9rem;border:1px solid var(--hair);padding:.12rem .45rem;display:inline-block}
.ds-flags{display:flex;gap:.35rem;flex-wrap:wrap}
.ds-flag{font-family:var(--mono);font-size:.56rem;letter-spacing:.05em;text-transform:uppercase;padding:.04rem .35rem;border-radius:2px}
.ds-flag.inv{color:var(--red);border:1px solid var(--red)}
.ds-flag.con{color:var(--green);border:1px solid var(--green)}
.ds-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem}
.ds-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.03em;color:var(--ink-dim);background:rgba(0,0,0,.035);padding:.1rem .4rem;border-radius:3px}

/* journal rows */
.jrnl-if{margin-top:1rem}
.jrnl-if .v{font-family:var(--serif);font-weight:900;font-size:1.9rem;line-height:1;letter-spacing:-.02em;color:var(--tc,var(--ink))}
.jrnl-if .k{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-top:.4rem}
.jrnl-rolling{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;color:var(--green);display:flex;align-items:center;gap:.4rem;margin-top:.9rem}
.jrnl-rolling::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}
.jrnl-pub{font-family:var(--mono);font-size:.62rem;letter-spacing:.03em;color:var(--ink-muted);margin-top:.9rem}
.jrnl-oa{font-family:var(--mono);font-size:.56rem;letter-spacing:.05em;text-transform:uppercase;color:var(--green);border:1px solid var(--green);padding:.04rem .35rem;border-radius:2px;margin-left:.4rem}

.empty{font-family:var(--mono);font-size:.74rem;color:var(--ink-muted);padding:3rem 0;text-align:center}

/* footer */
footer{padding:3.4rem 0 4rem;border-top:1px solid var(--hair);margin-top:3.4rem}
.fnote{font-family:var(--mono);font-size:.64rem;letter-spacing:.03em;color:var(--ink-muted);line-height:2}
.fnote a{color:var(--ink-dim)}

@media(max-width:680px){
  .wrap,.nav-in{padding-left:1.3rem;padding-right:1.3rem}
  .evt{grid-template-columns:1fr;gap:.7rem}
  .stats{gap:1.8rem}
  .cd{font-size:1.3rem}
}
</style>
</head>
<body>

<nav class="nav"><div class="nav-in">
  <div class="nav-row1">
    <a class="brand" href="./">🧠 BCI<em>·</em>Deadlines</a>
    <div class="modetabs" id="modetabs">
      <button class="mtab on" data-mode="conf" id="mtabConf"></button>
      <button class="mtab" data-mode="journal" id="mtabJournal"></button>
      <button class="mtab" data-mode="dataset" id="mtabDataset"></button>
    </div>
    <span class="spacer"></span>
    <input class="search" id="search" type="search" placeholder="">
    <button class="tool" id="papersBtn" title="显示/隐藏各会议近年论文">📄 论文</button>
    <button class="tool" id="langBtn">EN</button>
    <a class="tool" href="https://github.com/LarryYiGuo/BCI_Conference_Journal_Deadlines" target="_blank" rel="noopener">GitHub</a>
  </div>
  <div class="nav-row2" id="filters"></div>
</div></nav>

<div class="wrap">
  <header class="hero">
    <div class="kicker">BCI · Conference Deadlines</div>
    <h1 id="heroTitle"></h1>
    <p class="lede" id="heroSub"></p>
    <div class="stats" id="stats"></div>
  </header>

  <main id="list"></main>

  <footer>
    <div class="fnote" id="footerText"></div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="static/main.js?v=20260612-14"></script>
</body>
</html>
