    group_en: 'Natsue Yoshimura Lab, Tokyo Institute of Technology'
    year: 2025
    tag: 'INTL'
    desc: '通过分割听觉 EEG 做连续语音预测,听觉注意/语音解码方向,EUSIPCO 强项之一。'
    desc_en: 'Predicts continuous speech by segmenting auditory EEG, a work in auditory-attention and speech decoding, one of EUSIPCO''s strengths.'
  - title: 'Deep Learning Prediction of BOLD-fMRI Signals from Simultaneous EEG During Motor Imagery'
    group: 'Pietro Stabile 等 (意大利)'
    group_en: 'Pietro Stabile et al., Italy'
    year: 2025
    tag: 'INTL'
    desc: '用深度学习从同步采集的 EEG 预测运动想象时的 BOLD-fMRI 信号,EEG-fMRI 跨模态映射方向。'
    desc_en: 'Uses deep learning to predict BOLD-fMRI signals from simultaneously recorded EEG during motor imagery, an EEG-fMRI cross-modal mapping approach.'
  - title: 'A Geometry-Based Data Augmentation for EEG Motor Imagery Classification Via Deep Riemannian Networks'
    group: 'Denis Fantinato 等 (巴西)'
    group_en: 'Denis Fantinato et al., Brazil'
    year: 2025
    tag: 'INTL'
    desc: '基于黎曼几何的数据增强 + 深度黎曼网络做运动想象 EEG 分类,黎曼几何方法的信号处理路线。'
    desc_en: 'Combines Riemannian-geometry-based data augmentation with deep Riemannian networks for motor-imagery EEG classification, a Riemannian signal-processing route.'
  - title: 'Multiscale Fractal Analysis on EEG Signals for Music-Induced Emotion Recognition'
    group: 'Petros Maragos 组, NTUA 雅典国立技术大学 (希腊)'
    group_en: 'Petros Maragos Lab, NTUA (National Technical University of Athens), Greece'
    year: 2021
    tag: 'INTL'
    desc: '用多尺度分形分析做音乐诱发情绪的 EEG 识别,信号处理特色(非纯深度学习)的代表作。'
    desc_en: 'Applies multiscale fractal analysis to recognize music-induced emotion from EEG, a representative signal-processing (rather than purely deep-learning) work.'

miccai27:
