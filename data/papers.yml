    year: 2023
    tag: 'INTL'
    desc: '提出多尺度时域卷积加左右半球非对称空间卷积的 TSception,捕捉 EEG 情绪的时间动态与空间非对称性,成为情感识别代表性骨干网络。'
    desc_en: 'Multi-scale temporal CNN plus asymmetric hemispheric spatial convolution (TSception) that captures temporal dynamics and spatial asymmetry of emotional EEG; a widely used affective-computing backbone.'
  - title: 'Contrastive Learning of Subject-Invariant EEG Representations for Cross-Subject Emotion Recognition'
    group: '清华大学'
    group_en: 'Tsinghua University'
    year: 2023
    tag: 'CN'
    desc: '用对比学习最大化相同情绪刺激下不同被试 EEG 表征的相似性,学习被试不变的时空表征,在 THU-EP 与 SEED 上取得 SOTA 跨被试情绪识别。'
    desc_en: 'Uses contrastive learning to maximize similarity of EEG representations across subjects under the same emotional stimulus, yielding subject-invariant spatiotemporal features and SOTA cross-subject emotion recognition on THU-EP and SEED.'
  - title: 'EEG-Based Emotion Recognition Using Regularized Graph Neural Networks'
    group: '新加坡国立大学/上海交通大学'
    group_en: 'National University of Singapore / Shanghai Jiao Tong University'
    year: 2022
    tag: 'INTL'
    desc: '提出考虑脑区生物拓扑的正则化图神经网络 RGNN,建模 EEG 通道局部与全局关系,引入节点域对抗与情绪感知正则,情感识别经典基线。'
    desc_en: 'Regularized graph neural network (RGNN) that incorporates biological brain topology to capture local and global inter-channel relations, with node-domain adversarial training and emotion-aware regularization; a classic affective baseline.'

ieeetcds:
  - title: 'Causal Graph Convolutional Neural Network for Emotion Recognition'
    group: '杭州电子科技大学(孔万增组)'
    group_en: 'Hangzhou Dianzi University (Wanzeng Kong)'
    year: 2023
    tag: 'CN'
    desc: '用 Granger 因果检验构建有向非对称的脑电通道因果图,结合深度可分离卷积提取情绪特征的因果图卷积网络。'
    desc_en: 'Causal GCN that builds a directed, asymmetric inter-channel causal graph via Granger-causality testing and uses depthwise-separable convolutions to extract emotional EEG features.'
  - title: 'Transfer Learning for EEG-Based Brain-Computer Interfaces: A Review of Progress Made Since 2016'
    group: 'Wu Dongrui / Xu / Lu(华中科大)'
    group_en: 'Wu Dongrui / Xu / Lu, Huazhong University of Science and Technology'
    year: 2022
    tag: 'CN'
    desc: '系统综述 2016 年以来 EEG-BCI 迁移学习进展,跨被试/跨会话校准的权威参考。'
    desc_en: 'A systematic review of transfer-learning progress in EEG-BCI since 2016, an authoritative reference for cross-subject and cross-session calibration.'
  - title: 'Can Emotion Be Transferred? — A Review on Transfer Learning for EEG-Based Emotion Recognition'
    group: '国内情感 BCI 研究组'
    group_en: 'Chinese affective-BCI research group'
    year: 2022
    tag: 'CN'
    desc: '专门梳理 EEG 情感识别迁移学习方法与基准,面向跨被试个体差异问题。'
    desc_en: 'A focused survey of transfer-learning methods and benchmarks for EEG emotion recognition, targeting cross-subject individual differences.'
  - title: 'Cognitive Workload Estimation Using Variational Autoencoder and Attention-Based Deep Model'
    group: 'Chakladar 等'
    group_en: 'Chakladar et al.'
    year: 2022
    tag: 'INTL'
    desc: '用变分自编码器+注意力深度模型估计 EEG 认知负荷,被动 BCI 认知状态评估代表作。'
    desc_en: 'Estimates EEG cognitive workload with a variational autoencoder and an attention-based deep model, a representative passive-BCI cognitive-state assessment work.'

ieeethms:
  - title: 'Emotion Recognition by Combining EEG and EOG Signals over Relevant Channels with Optimal Windowing'
    group: 'Huili Cai 等'
    group_en: 'Huili Cai et al.'
    year: 2023
    tag: 'CN'
    desc: '融合 EEG 与 EOG 多模态、做通道选择与最优窗口的情感识别,贴合人机系统应用场景。'
    desc_en: 'Fuses EEG and EOG with channel selection and optimal windowing for emotion recognition, well suited to human-machine system applications.'

cognitivecomputati:
  - title: 'A Fuzzy Ensemble-Based Deep Learning Model for EEG-Based Emotion Recognition'
    group: '国际模糊集成深度学习组'
    group_en: 'International fuzzy-ensemble deep-learning group'
    year: 2023
    tag: 'INTL'
    desc: '用 Gompertz 模糊秩融合多个深度模型,DEAP/AMIGOS 上 valence/arousal 达 90% 级精度。'
    desc_en: 'Fuses multiple deep models via Gompertz fuzzy rank fusion, reaching ~90% valence/arousal accuracy on DEAP and AMIGOS.'

cognitiveneurodyna:
  - title: 'EEG-based emotion recognition using a temporal-difference minimizing neural network'
    group: '胡德文组/国防科技大学'
    group_en: 'Hu Lab, National University of Defense Technology'
    year: 2023
    tag: 'CN'
    desc: '利用「情绪随时间缓慢变化」先验,用最大均值差异约束的多分支卷积-循环网络做跨数据集 EEG 情绪识别。'
    desc_en: 'TDMNN exploits the slow temporal variation of emotion via an MMD-constrained convolutional-recurrent network for EEG emotion recognition.'

journalofneuraleng:
  - title: 'Large Brain Model for Learning Generic Representations with Tremendous EEG Data in BCI (LaBraM)'
    group: '上海交通大学(吕宝粮组等)'
    group_en: 'Shanghai Jiao Tong University'
    year: 2024
    tag: 'INTL'
    desc: '将 EEG 切分为通道-patch,用矢量量化神经频谱预测训练神经分词器,再用掩码 Transformer 预训练,在约 2500 小时 EEG 上学得通用表征,多任务超越 SOTA(ICLR 2024 Spotlight)。'
    desc_en: 'Segments EEG into channel patches, trains a neural tokenizer via vector-quantized neural-spectrum prediction, and pre-trains masked Transformers on ~2500 h of EEG to learn generic representations beating SOTA across tasks (ICLR 2024 Spotlight).'
  - title: 'Deep learning-based electroencephalography analysis: a systematic review'
    group: 'Roy, Banville, Gramfort, Falk, Faubert (MIST Lab / Inria)'
    group_en: 'Roy, Banville, Gramfort, Falk, Faubert (MIST Lab / Inria)'
    year: 2021
    tag: 'INTL'
    desc: '系统综述 154 篇 EEG 深度学习工作,覆盖 BCI/睡眠/癫痫等,确立了 EEG 深度解码的研究范式与评测惯例,被广泛引用(原刊 2019,JNE 高引代表作)。'
    desc_en: 'A systematic review of 154 EEG deep-learning studies spanning BCI, sleep, and epilepsy that established research paradigms and evaluation conventions for EEG deep decoding (originally 2019, a highly cited JNE work).'
  - title: 'Generalized neural decoders for transfer learning across participants and recording modalities'
    group: 'Peterson, Steine-Hanson, Rao, Brunton (University of Washington)'
    group_en: 'Peterson, Steine-Hanson, Rao, Brunton, University of Washington'
    year: 2021
    tag: 'INTL'
    desc: '提出可跨被试、跨记录模态迁移的通用神经解码器,缓解 BCI 个体差异与标定成本问题,是 EEG/ECoG 迁移学习的代表工作。'
    desc_en: 'Proposes generalized neural decoders that transfer across participants and recording modalities, reducing BCI individual differences and calibration cost; a representative EEG/ECoG transfer-learning work.'

ieeetnsre:
  - title: 'EEG Conformer: Convolutional Transformer for EEG Decoding and Visualization'
    group: '清华大学(高小榕组)/华南理工大学'
    group_en: 'Tsinghua University (Xiaorong Gao) / South China University of Technology'
    year: 2023
    tag: 'CN'
    desc: '用卷积模块提局部时空特征、自注意力提全局相关性的紧凑 Conformer,统一 EEG 分类框架并提供类激活脑地形图可视化,运动想象/情绪解码常用骨干。'
    desc_en: 'Compact convolutional-Transformer (Conformer) unifying local convolutional features and global self-attention for EEG classification, with class-activation brain-topography visualization; a popular MI/emotion decoding backbone.'
  - title: 'An SSVEP-Based Brain-Computer Interface Controlled Soft Robotic Glove for Post-Stroke Hand Function Rehabilitation'
    group: 'Singapore / 康复 BCI 团队'
    group_en: 'Singapore rehabilitation-BCI team'
    year: 2022
    tag: 'INTL'
    desc: 'SSVEP-BCI 驱动软体机器手套用于卒中后手功能康复,是 TNSRE 对口的 BCI+康复闭环代表性临床工程工作。'
    desc_en: 'An SSVEP-BCI-driven soft robotic glove for post-stroke hand-function rehabilitation, a representative closed-loop BCI-plus-rehabilitation clinical-engineering work fitting TNSRE''s scope.'
  - title: 'A Benchmark Dataset for SSVEP-Based Brain-Computer Interfaces'
    group: 'Wang, Chen, Gao, Gao (清华大学 高小榕/高上凯组)'
    group_en: 'Wang, Chen, Gao, Gao (Gao Xiaorong / Gao Shangkai Lab, Tsinghua University)'
    year: 2021
    tag: 'CN'
    desc: '清华 40 目标 SSVEP speller 公开基准数据集(35 被试),成为 SSVEP-BCI 算法评测事实标准,持续高引(原刊 2017,TNSRE 代表作)。'
    desc_en: 'A public 40-target SSVEP speller benchmark dataset (35 subjects) from Tsinghua that became the de facto standard for evaluating SSVEP-BCI algorithms (originally 2017, a highly cited TNSRE work).'

ieeetbme:
  - title: 'FBMSNet: A Filter-Bank Multi-Scale Convolutional Neural Network for EEG-Based Motor Imagery Decoding'
    group: '南洋理工大学 Cuntai Guan 组'
    group_en: 'Nanyang Technological University (Cuntai Guan Lab)'
    year: 2022
    tag: 'INTL'
    desc: '用滤波器组得到多视角频谱表征,再以多尺度卷积提取时空特征的端到端网络,提升运动想象 EEG 解码鲁棒性。'
    desc_en: 'End-to-end network deriving a multi-view spectral representation via a filter bank and extracting spatiotemporal features with multi-scale convolutions, improving robustness of motor-imagery EEG decoding.'
  - title: 'MIN2Net: End-to-End Multi-Task Learning for Subject-Independent Motor Imagery EEG Classification'
    group: '泰国 VISTEC 研究院'
    group_en: 'Vidyasirimedhi Institute of Science and Technology (VISTEC), Thailand'
    year: 2022
    tag: 'INTL'
    desc: '端到端多任务学习框架,联合深度度量学习与自编码重构,实现被试无关的运动想象 EEG 分类。'
    desc_en: 'End-to-end multi-task learning framework jointly using deep metric learning and autoencoder reconstruction for subject-independent motor-imagery EEG classification.'

naturebiomedicalen:
  - title: 'Long-term unsupervised recalibration of cursor-based intracortical brain-computer interfaces using a hidden Markov model'
    group: '斯坦福大学/BrainGate 团队'
    group_en: 'Stanford University / BrainGate consortium'
    year: 2025
    tag: 'INTL'
    desc: '用隐马尔可夫模型对皮层内光标 BCI 进行长期无监督自校准,缓解神经信号漂移,维持长期稳定的解码性能。'
    desc_en: 'Uses a hidden Markov model for long-term unsupervised recalibration of cursor-based intracortical BCIs, mitigating neural signal drift to sustain stable decoding over time.'
  - title: 'A bilingual speech neuroprosthesis driven by cortical articulatory representations shared between languages'
    group: '加州大学旧金山分校(Edward Chang 组)'
    group_en: 'University of California, San Francisco (Edward Chang Lab)'
    year: 2024
    tag: 'Highlight'
    desc: '基于皮层 ECoG,利用英西双语共享的发音运动皮层表征,为瘫痪患者实现双语语音神经假体解码的里程碑工作。'
    desc_en: 'An ECoG-based bilingual speech neuroprosthesis that decodes English and Spanish from shared cortical articulatory representations in a paralyzed participant; a milestone clinical demonstration.'
  - title: 'Endocisternal interfaces for minimally invasive neural stimulation and recording of the brain and spinal cord'
    group: 'Rice University / 神经接口团队'
    group_en: 'Rice University neural-interface team'
    year: 2024
    tag: 'INTL'
    desc: '提出经脑池(endocisternal)微创神经接口,用无线磁电供能电子器件实现脑与脊髓的记录/刺激,可慢性植入后取出,代表微创 BCI 硬件方向。'
    desc_en: 'Proposes minimally invasive endocisternal neural interfaces using wireless magnetoelectric-powered electronics to record from and stimulate the brain and spinal cord, chronically implantable and retrievable, a representative minimally invasive BCI-hardware direction.'

braincomputerinter:
  - title: 'A hybrid brain-computer interface using motor imagery and SSVEP based on convolutional neural network'
    group: '未确认机构'
    group_en: 'Not confirmed'
    year: 2023
    tag: 'INTL'
    desc: '结合运动想象与 SSVEP 两类范式、用 CNN 解码的混合脑机接口系统,提升系统通用性与泛化能力(Taylor & Francis 《Brain-Computer Interfaces》正刊)。'
    desc_en: 'A hybrid BCI combining motor imagery and SSVEP paradigms decoded by a CNN to improve versatility and generalization, published in the T&F journal Brain-Computer Interfaces.'

neuroimage:
  - title: 'Multi-objective optimization via evolutionary algorithm (MOVEA) for high-definition transcranial electrical stimulation of the human brain'
    group: '刘泉影组/南方科技大学、韦鹏飞组/中科院深圳先进院'
    group_en: 'Liu Lab, SUSTech; Wei Lab, SIAT-CAS'
    year: 2023
    tag: 'CN'
    desc: '提出基于进化算法的多目标优化框架 MOVEA,用 Pareto 优化同时兼顾经颅电刺激的强度、聚焦度与避让区,给出个性化刺激方案。'
    desc_en: 'MOVEA, an evolutionary multi-objective framework that Pareto-optimizes intensity, focality and avoidance zones for personalized high-definition transcranial electrical stimulation.'
  - title: 'A large and rich EEG dataset for modeling human visual object recognition (THINGS-EEG)'
    group: 'Cichy 组/柏林自由大学'
    group_en: 'Cichy Lab, Freie Universität Berlin'
    year: 2022
    tag: 'INTL'
    desc: '发布 THINGS-EEG 大规模视觉物体识别 EEG 数据集,10 名被试、16,740 张图像 RSVP 范式,成为视觉神经解码的标准基准。'
    desc_en: 'Releases THINGS-EEG, a large RSVP EEG dataset (10 subjects, 16,740 images) that became a standard benchmark for visual object decoding.'

humanbrainmapping:
  - title: 'EEG microstates in early-to-middle childhood show associations with age, biological sex, and alpha power'
    group: '国际发育神经影像研究组'
    group_en: 'International developmental neuroimaging group'
    year: 2023
    tag: 'INTL'
    desc: '研究儿童期 EEG 微状态与年龄、性别、alpha 功率的关联,刻画发育期大脑网络动态。'
    desc_en: 'Links EEG microstates in childhood to age, biological sex and alpha power, characterizing developmental brain-network dynamics.'
  - title: 'Brain functional and effective connectivity based on electroencephalography recordings: A review'
    group: 'EEG 功能/有效连接综述团队'
    group_en: 'EEG functional/effective connectivity review team'
    year: 2022
    tag: 'INTL'
    desc: '系统综述基于 EEG 的功能连接与有效连接估计方法,梳理度量、陷阱与应用,是 HBM 上 EEG 连接组方法学的高引参考文献。'
    desc_en: 'A systematic review of EEG-based functional and effective connectivity estimation methods, surveying metrics, pitfalls, and applications; a highly cited HBM methodological reference on the EEG connectome.'

braintopography:
  - title: 'Current State of EEG/ERP Microstate Research'
    group: '伯尔尼 EEG 微状态共识会议团队(Brain Topography 特刊)'
    group_en: 'Bern EEG microstate consensus team (Brain Topography special issue)'
    year: 2024
    tag: 'INTL'
    desc: '源自 2022 年伯尔尼会议的 EEG/ERP 微状态研究现状与标准化共识,推动微状态分析方法规范化,是该刊微状态特刊的核心综述。'
    desc_en: 'A status-and-standardization consensus on EEG/ERP microstate research stemming from the 2022 Bern meeting, advancing methodological standardization and serving as the core review of the journal''s microstate special issue.'
  - title: 'On the Reliability of the EEG Microstate Approach'
    group: '国际 EEG 微状态研究组'
    group_en: 'International EEG microstate groups'
    year: 2023
    tag: 'INTL'
    desc: '系统评估 EEG 微状态分析的重测信度,报告 duration/occurrence/coverage 等参数具有良好到优秀的可靠性。'
    desc_en: 'Systematically evaluates retest reliability of EEG microstate analysis, reporting good-to-excellent reliability of duration, occurrence and coverage.'

biomedicalsignalpr:
  - title: 'A classification method for EEG motor imagery signals based on parallel convolutional neural network'
    group: '运动想象 EEG 深度学习团队(Biomedical Signal Processing and Control)'
    group_en: 'Motor-imagery EEG deep-learning team (Biomedical Signal Processing and Control)'
    year: 2022
    tag: 'INTL'
    desc: '用并行卷积神经网络做运动想象 EEG 分类,是该刊 EEG-BCI 方向高产代表性深度学习工作之一。'
    desc_en: 'Classifies motor-imagery EEG with a parallel convolutional neural network, one of the journal''s prolific representative deep-learning works in EEG-BCI.'

ieeetransinstrumen:
  - title: 'A Multi-Dimensional Graph Convolution Network for EEG Emotion Recognition'
    group: '杜广龙组/华南理工大学'
    group_en: 'South China University of Technology'
    year: 2022
    tag: 'CN'
    desc: '提出多维图卷积网络,联合建模 EEG 的空间、频率与时间维度图结构以提升情绪识别精度。'
    desc_en: 'A multi-dimensional graph convolution network jointly modeling spatial, spectral and temporal graph structure of EEG for emotion recognition.'
  - title: 'Emotion recognition by discriminating EEG segments with high affective content from automatically selected relevant channels'
    group: 'Sarma & Barma (Tezpur University)'
    group_en: 'Sarma & Barma, Tezpur University'
    year: 2022
    tag: 'INTL'
    desc: '自动选择相关通道并甄别高情感片段做 EEG 情绪识别,体现 IEEE TIM 在 EEG 测量与情绪 BCI 上的方法学贡献。'
    desc_en: 'Recognizes emotion from EEG by automatically selecting relevant channels and identifying high-affective-content segments, reflecting IEEE TIM''s methodological contributions to EEG measurement and affective BCI.'

computersinbiology:
  - title: 'EpilepsyNet: Novel automated detection of epilepsy using transformer model with EEG signals from 121 patient population'
    group: 'EpilepsyNet 团队 (含 USQ 等)'
    group_en: 'EpilepsyNet team (incl. USQ)'
    year: 2023
    tag: 'INTL'
    desc: '用 Transformer 对 35 通道、121 名受试者 EEG 做癫痫自动检测,首次将可学习位置编码加到相关系数嵌入上,准确率约 85%,是该刊癫痫 EEG 深度学习代表作。'
    desc_en: 'Detects epilepsy automatically with a Transformer over 35-channel EEG from 121 patients, the first to add learnable positional encoding to correlation-coefficient embeddings, reaching ~85% accuracy; a representative epilepsy EEG deep-learning work for the journal.'
  - title: 'SEEG-Net: An explainable and deep learning-based cross-subject pathological activity detection method for drug-resistant epilepsy'
    group: '国内癫痫脑电研究组'
    group_en: 'Epilepsy EEG research group (China)'
    year: 2022
    tag: 'CN'
    desc: '提出可解释深度学习方法 SEEG-Net,从立体脑电(SEEG)中跨被试检测耐药性癫痫的病理活动。'
    desc_en: 'SEEG-Net, an explainable deep-learning method for cross-subject detection of pathological activity in drug-resistant epilepsy from stereo-EEG.'
  - title: 'A deep learning based ensemble learning method for epileptic seizure prediction'
    group: 'Usman, Khalid & Bashir'
    group_en: 'Usman, Khalid & Bashir'
    year: 2021
    tag: 'INTL'
    desc: '基于深度学习的集成方法做癫痫发作预测,是 Computers in Biology and Medicine 上 EEG 癫痫预测方向的高引代表工作。'
    desc_en: 'A deep-learning-based ensemble method for epileptic seizure prediction, a highly cited representative work in EEG epilepsy prediction in Computers in Biology and Medicine.'

computermethodsand:
  - title: 'Interpreting deep learning models for epileptic seizure detection on EEG signals'
    group: '国际癫痫检测研究组'
    group_en: 'International seizure detection group'
    year: 2021
    tag: 'INTL'
    desc: '针对 EEG 癫痫检测的深度学习模型给出可解释性分析,揭示模型决策依据。'
    desc_en: 'Provides interpretability analysis of deep-learning models for EEG epileptic seizure detection.'
