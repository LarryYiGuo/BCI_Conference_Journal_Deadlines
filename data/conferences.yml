# BCI Conference Deadlines · 数据文件 / data file
# ─────────────────────────────────────────────────────────────
# 字段 / fields:
#   id                 唯一标识 unique id
#   title / year       会议简称 / 届次年份
#   full_name          会议全名
#   link               官网 URL
#   deadline           全文截稿 'YYYY-MM-DD HH:MM',未公布写 TBD
#   abstract_deadline  摘要/注册截稿(可选)
#   tz / tz_label      截稿时区 UTC 偏移(AoE = '-12:00')/ 显示文字
#   date / place       会议日期 / 举办地
#   sub                方向: ML | DM | NC | CV | AC | SP | BME | BCI
#   rank               CCF 等级(中国),非目录写 '非CCF'
#   core               CORE 等级(国际),N = 不在 CORE 目录
#   h5                 Google Scholar h5-index(会议无 JCR IF)
#   ccfddl             ccfddl 数据源文件名,GitHub Action 每周自动同步;null = 人工维护
#   track              轮次/赛道(如 Round 1 / Cycle 1 / Conference Track)
#   estimated          true = 官方未公布,按往年规律推测;false 的条目不会被自动同步覆盖
#   note / note_en     备注(中 / 英,客观信息)
# ─────────────────────────────────────────────────────────────
# 主题 themes(颜色越深 = 分级越高):
#   算法/蓝   ML 机器学习 · DM 数据挖掘检索 · NC 神经计算
#   视觉/紫   CV 视觉多媒体 · AC 情感计算交互
#   医疗/黄   BME 医工影像 · SP 信号处理
#   神经/红   BCI 神经工程·神经科学
# ─────────────────────────────────────────────────────────────

