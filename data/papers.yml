# BCI Papers · 各会议/期刊近年 BCI/EEG 论文索引(中英双语)/ per-venue recent-paper index (bilingual)
# ─────────────────────────────────────────────────────────────
# 近五年(2021+)代表性主会/正刊论文。多智能体并行检索(带来源核验)+ 人工 curate。
# 每篇字段:title / group(中)+ group_en(英)/ year / tag / desc(中)+ desc_en(英)。
# 网站顶部「论文」开关在会议与期刊视图均可展示;标题链到 Google Scholar 搜索。
# ─────────────────────────────────────────────────────────────

# ════════ 会议 conferences ════════

neurips27:
  - title: 'CSBrain: A Cross-scale Spatiotemporal Brain Foundation Model for EEG Decoding'
    group: '中国(EEG基础模型团队)'
    group_en: 'CSBrain authors (EEG foundation model team)'
    year: 2025
    tag: 'Spotlight'
    desc: '跨尺度时空EEG基础模型,提出跨尺度时空tokenization(CST)与结构化稀疏注意力(SSA),在11任务16数据集上SOTA。'
    desc_en: 'A cross-scale spatiotemporal EEG foundation model with Cross-scale Spatiotemporal Tokenization (CST) and Structured Sparse Attention (SSA); SOTA on 11 tasks / 16 datasets.'
  - title: 'Multi-dataset Joint Pre-training of Emotional EEG Enables Generalizable Affective Computing'
    group: '刘泉影组/南方科技大学'
    group_en: 'Liu Quanying Group, Southern University of Science and Technology (SUSTech)'
    year: 2025
    tag: 'CN'
    desc: '情绪EEG多数据集联合预训练框架,提出跨数据集协方差对齐损失与Mamba式线性注意力编码器,实现可泛化情感计算。'
    desc_en: 'A multi-dataset joint pre-training framework for emotional EEG with a cross-dataset covariance alignment loss and a Mamba-like linear-attention encoder for generalizable affective computing.'
  - title: 'NeurIPT: Foundation Model for Neural Interfaces'
    group: '海外 EEG-based Neural Interfaces foundation model'
    group_en: 'Overseas (EEG-based neural interface foundation model)'
    year: 2025
    tag: 'INTL'
    desc: 'Amplitude-Aware Masked Pretraining (AAMP) + Mixture-of-Experts处理多电极配置。专注neural interface多任务泛化。'
    desc_en: 'Combines Amplitude-Aware Masked Pretraining (AAMP) with a Mixture-of-Experts design to handle heterogeneous electrode configurations, targeting multi-task generalization across neural interfaces.'
  - title: 'EEG2Video: Towards Decoding Dynamic Visual Perception from EEG Signals'
    group: '吕宝粮/郑伟龙组/上海交通大学'
    group_en: 'Lu & Zheng Group (BCMI Lab), Shanghai Jiao Tong University'
    year: 2024
    tag: 'CN'
    desc: '首个从EEG解码动态视觉感知(视频)的框架,发布SEED-DV数据集,结合Seq2Seq、DANA与inflated Stable Diffusion重建视频。'
    desc_en: 'First framework to decode dynamic visual perception (video) from EEG; releases SEED-DV and combines Seq2Seq, DANA, and an inflated Stable Diffusion.'
  - title: 'EEGPT: Pretrained Transformer for Universal and Reliable Representation of EEG Signals'
    group: '王光宇组/北京邮电大学'
    group_en: 'Wang Guangyu Group, Beijing University of Posts and Telecommunications (BUPT)'
    year: 2024
    tag: 'INTL'
    desc: '千万参数EEG预训练Transformer,掩码式双自监督并引入时空表征对齐,缓解低信噪比下特征质量差的问题。'
    desc_en: 'A 10M-parameter pretrained EEG Transformer with mask-based dual self-supervision and spatio-temporal representation alignment for low-SNR robustness.'
  - title: 'Visual Decoding and Reconstruction via EEG Embeddings with Guided Diffusion'
    group: '刘泉影组/南方科技大学'
    group_en: 'Liu Quanying Group, Southern University of Science and Technology (SUSTech)'
    year: 2024
    tag: 'CN'
    desc: '提出ATM(Adaptive Thinking Mapper)脑编码器,将EEG投影到CLIP空间并用引导扩散实现零样本视觉解码与重建。'
    desc_en: 'Proposes the Adaptive Thinking Mapper (ATM) brain encoder projecting EEG into CLIP space with guided diffusion for zero-shot visual decoding and reconstruction.'
  - title: 'NeuroBOLT: Resting-state EEG-to-fMRI Synthesis with Multi-dimensional Feature Mapping'
    group: '范德堡大学'
    group_en: 'Vanderbilt University'
    year: 2024
    tag: 'INTL'
    desc: 'Neuro-to-BOLD Transformer,从时间/空间/频谱多维表征将头皮EEG转换为全脑BOLD fMRI信号,无需预设血流动力学延迟。'
    desc_en: 'A Neuro-to-BOLD Transformer translating scalp EEG into whole-brain BOLD fMRI via temporal/spatial/spectral features without a predefined hemodynamic delay.'
  - title: 'Con4m: Context-aware Consistency Learning Framework for Segmented Time Series Classification'
    group: '浙大 ZJU-BrainNet (杨洋组)'
    group_en: 'ZJU-BrainNet (Yang Yang Lab), Zhejiang University'
    year: 2024
    tag: 'CN'
    desc: '面向SEEG等brain signal分段时间序列的一致性学习。和 DMNet 同时入选 NeurIPS 2024。'
    desc_en: 'A consistency-learning framework for segmented time-series classification of brain signals such as SEEG; accepted at NeurIPS 2024 alongside DMNet.'
  - title: 'DMNet'
    group: '浙大 ZJU-BrainNet (杨洋组)'
    group_en: 'ZJU-BrainNet (Yang Yang Lab), Zhejiang University'
    year: 2024
    tag: 'CN'
    desc: '浙大杨洋组 NeurIPS 2024 双中之一，BrainNet系列扩展。'
    desc_en: 'One of two NeurIPS 2024 papers from Yang Yang''s group, extending the BrainNet line of work.'
  - title: 'seegnificant: Neural Decoding from Stereotactic EEG Across Subjects'
    group: '海外 sEEG跨被试decoding'
    group_en: 'Overseas (cross-subject sEEG decoding)'
    year: 2024
    tag: 'INTL'
    desc: '侵入式EEG跨被试整合。Electrode-wise self-attention + 3D location embedding + 21名受试者联合训练。'
    desc_en: 'Integrates invasive EEG across subjects via electrode-wise self-attention, 3D location embeddings, and joint training on 21 participants.'
  - title: 'BIOT: Biosignal Transformer for Cross-data Learning in the Wild'
    group: 'Sun Lab/伊利诺伊大学香槟分校'
    group_en: 'Sun Lab, University of Illinois Urbana-Champaign (UIUC)'
    year: 2023
    tag: 'INTL'
    desc: '生物信号Transformer,通过通道tokenization统一处理不同导联/采样率/长度的EEG等生物信号,实现跨数据集联合学习。'
    desc_en: 'A biosignal Transformer that tokenizes channels to unify EEG and other biosignals with heterogeneous montages/rates/lengths for cross-dataset learning.'
  - title: 'Brant: Foundation Model for Intracranial Neural Signal'
    group: '杨洋组/浙江大学'
    group_en: 'Yang Yang Group, Zhejiang University'
    year: 2023
    tag: 'INTL'
    desc: '面向颅内神经信号(SEEG)的基础模型,联合建模长程时间依赖与跨通道空间相关,大规模预训练。'
    desc_en: 'A foundation model for intracranial (SEEG) neural signals capturing long-term temporal dependencies and cross-channel spatial correlations via large-scale pretraining.'
  - title: 'DeWave: Discrete Encoding of EEG Waves for EEG to Text Translation'
    group: '林彬组/悉尼科技大学(UTS)'
    group_en: 'Lin Group, University of Technology Sydney (UTS)'
    year: 2023
    tag: 'Spotlight'
    desc: '用矢量量化离散codex编码对齐预训练语言模型,实现无需眼动标记的开放词表EEG-to-Text翻译。'
    desc_en: 'Uses a quantized discrete codex aligned to pretrained LMs for marker-free, open-vocabulary EEG-to-text translation.'
  - title: 'PPi: Pretraining Brain Signal Model for Patient-independent Seizure Detection'
    group: '杨洋组/浙江大学'
    group_en: 'Yang Yang Group, Zhejiang University'
    year: 2023
    tag: 'INTL'
    desc: '面向患者无关癫痫检测的SEEG预训练模型,设计通道背景消减与脑区增强两项自监督技术应对跨患者域漂移。'
    desc_en: 'A pretraining SEEG model for patient-independent seizure detection, with channel background subtraction and brain-region enhancement to tackle cross-patient domain shift.'
  - title: 'Reconstructing the Mind''s Eye: fMRI-to-Image with Contrastive Learning and Diffusion Priors'
    group: 'MedARC/普林斯顿大学'
    group_en: 'MedARC / Princeton University'
    year: 2023
    tag: 'INTL'
    desc: 'MindEye:fMRI-to-Image模型,双子模块并行做检索与重建,将fMRI映射到多模态隐空间,达到SOTA图像重建与检索。'
    desc_en: 'MindEye: an fMRI-to-image model with parallel retrieval and reconstruction submodules mapping fMRI to multimodal latents; SOTA image reconstruction and retrieval.'
  - title: 'DeWave: Discrete EEG Waves Encoding for Brain Dynamics to Text Translation'
    group: 'UTS Sydney (GrapheneX-UTS HAI Centre)'
    group_en: 'GrapheneX-UTS HAI Centre, University of Technology Sydney'
    year: 2023
    tag: 'Spotlight'
    desc: 'EEG-to-Text直接翻译代表作。Vector-quantized discrete codex，无需eye-tracking marker即可在ZuCo做open-vocabulary翻译。'
    desc_en: 'A landmark EEG-to-text approach that uses a vector-quantized discrete codex to perform open-vocabulary translation on ZuCo without relying on eye-tracking markers.'
  - title: 'MAEEG: Masked Auto-encoder for EEG Representation Learning'
    group: '海外 EEG self-supervised representation learning workshop paper'
    group_en: 'Overseas (EEG self-supervised representation learning, workshop paper)'
    year: 2022
    tag: 'Workshop'
    desc: '最早把 ViT-style masked reconstruction 直接搬到 EEG 上的工作。后续 LaBraM/CBraMod/EEGPT 都受这一思路启发。'
    desc_en: 'Among the first to port ViT-style masked reconstruction directly to EEG, inspiring later models such as LaBraM, CBraMod, and EEGPT.'

iclr27:
  - title: 'CBraMod: A Criss-Cross Brain Foundation Model for EEG Decoding'
    group: '潘纲组/浙江大学'
    group_en: 'Pan Gang Group, Zhejiang University'
    year: 2025
    tag: 'INTL'
    desc: '提出criss-cross注意力分离建模EEG的空间与时间依赖,patch级掩码重建预训练,在10类下游BCI任务(12个数据集)上达到SOTA。'
    desc_en: 'Introduces criss-cross attention to separately model spatial and temporal EEG dependencies with patch-based masked reconstruction; SOTA across 10 downstream BCI tasks (12 datasets).'
  - title: 'NeuroLM: A Universal Multi-task Foundation Model for Bridging the Gap between Language and EEG Signals'
    group: '何晖光组/中科院自动化所'
    group_en: 'He Lab, Institute of Automation, Chinese Academy of Sciences (CASIA)'
    year: 2025
    tag: 'INTL'
    desc: '首个将EEG视为''外语''接入LLM的多任务基础模型,通过文本对齐神经分词器与多通道自回归实现多任务学习与推理。'
    desc_en: 'First multi-task foundation model treating EEG as a foreign language for LLMs, via a text-aligned neural tokenizer and multi-channel autoregression.'
  - title: 'Population Transformer: Learning Population-level Representations of Neural Activity'
    group: 'MIT'
    group_en: 'MIT'
    year: 2025
    tag: 'Oral'
    desc: '在BrainBERT等时序嵌入之上学习任意电极集合的群体级表征,解决跨被试电极稀疏可变问题,降低下游解码数据需求。'
    desc_en: 'Learns population-level codes over arbitrary electrode ensembles atop temporal embeddings (e.g., BrainBERT), addressing sparse/variable electrode layouts across subjects.'
  - title: 'BrainUICL: An Unsupervised Individual Continual Learning Framework for EEG Applications'
    group: '浙江大学脑机智能国家重点实验室 (潘纲组)'
    group_en: 'State Key Laboratory of Brain-Machine Intelligence (Pan Gang Lab), Zhejiang University'
    year: 2025
    tag: 'CN'
    desc: '解决"个体持续适应"问题——预训练模型部署新被试时无监督持续校准。'
    desc_en: 'Tackles continual individual adaptation, enabling unsupervised ongoing calibration when a pretrained model is deployed to new subjects.'
  - title: 'Animate Your Thoughts (Mind-Animator): Reconstruction of Dynamic Natural Vision from Human Brain Activity'
    group: '中科院自动化所 (何晖光组)'
    group_en: 'He Lab, CASIA'
    year: 2025
    tag: 'CN'
    desc: '动态自然视觉重建——基于脑活动重建视频片段。'
    desc_en: 'Reconstructs dynamic natural vision, recovering video clips from human brain activity.'
  - title: 'Learning Task Belief Similarity with Latent Dynamics for Meta-Reinforcement Learning'
    group: '南方科技大学 NCC Lab (刘泉影组)'
    group_en: 'NCC Lab (Liu Quanying Lab), Southern University of Science and Technology'
    year: 2025
    tag: 'CN'
    desc: '不是直接EEG paper但是组内RL方向延伸——meta-RL中task belief相似性学习。'
    desc_en: 'Not strictly an EEG paper but an extension of the lab''s RL work, learning task-belief similarity via latent dynamics for meta-reinforcement learning.'
  - title: 'Large Brain Model for Learning Generic Representations with Tremendous EEG Data in BCI'
    group: '何晖光组/中科院自动化所'
    group_en: 'He Lab, Institute of Automation, Chinese Academy of Sciences (CASIA)'
    year: 2024
    tag: 'Spotlight'
    desc: 'LaBraM:在约2500小时、20个数据集上预训练的EEG基础模型,矢量量化神经频谱预测构建神经分词器,跨数据集统一表征,是EEG基础模型的奠基之作。'
    desc_en: 'LaBraM: a foundational EEG model pre-trained on ~2,500 hours across ~20 datasets using vector-quantized neural spectrum prediction; a landmark EEG foundation model.'
  - title: 'CLIP-MUSED: CLIP-Guided Multi-Subject Visual Neural Information Semantic Decoding'
    group: '中科院自动化所 (何晖光组)'
    group_en: 'He Lab, CASIA'
    year: 2024
    tag: 'CN'
    desc: 'CLIP-引导的跨被试视觉神经语义解码。在fMRI多被试decoding上突破。'
    desc_en: 'CLIP-guided semantic decoding of visual neural information across subjects, advancing multi-subject fMRI decoding.'
  - title: 'BrainBERT: Self-supervised representation learning for intracranial recordings'
    group: 'MIT/哈佛大学'
    group_en: 'MIT / Harvard University'
    year: 2023
    tag: 'INTL'
    desc: '颅内电极(SEEG/ECoG)信号的自监督表征学习,BERT式预训练,成为后续颅内神经信号基础模型的基石之一。'
    desc_en: 'Self-supervised, BERT-style representation learning for intracranial (SEEG/ECoG) recordings; a cornerstone for later intracranial neural foundation models.'

icml27:
  - title: 'EmoGrowth: Incremental Multi-label Emotion Decoding with Augmented Emotional Relation Graph'
    group: '中科院自动化所 (何晖光组)'
    group_en: 'He Lab, CASIA'
    year: 2025
    tag: 'CN'
    desc: '增量多标签情感解码——情感关系图增强的脑信号情感decoding。'
    desc_en: 'Incremental multi-label emotion decoding from brain signals, enhanced by an augmented emotional relation graph.'
  - title: 'Synthesizing Images on Perceptual Boundaries of ANNs for Uncovering and Manipulating Human Perceptual Variability'
    group: '南方科技大学 NCC Lab (刘泉影组)'
    group_en: 'NCC Lab (Liu Quanying Lab), Southern University of Science and Technology'
    year: 2025
    tag: 'CN'
    desc: '利用 ANN perceptual boundaries 合成图像探测 human perceptual variability，神经科学+AI 融合方向代表。'
    desc_en: 'Synthesizes images at the perceptual boundaries of artificial neural networks to probe human perceptual variability, exemplifying the neuroscience-AI intersection.'
  - title: 'MindEye2: Shared-Subject Models Enable fMRI-To-Image With 1 Hour of Data'
    group: 'MedARC/普林斯顿大学'
    group_en: 'MedARC / Princeton University'
    year: 2024
    tag: 'INTL'
    desc: '跨7名被试预训练并以新被试1小时数据微调,通过共享被试隐空间的功能对齐实现高质量fMRI到图像重建。'
    desc_en: 'Pretrains across 7 subjects and fine-tunes on 1 hour of a new subject''s fMRI via shared-subject functional alignment for high-quality fMRI-to-image reconstruction.'

aaai27:
  - title: 'Multi-to-Single: Reducing Multimodal Dependency in Emotion Recognition Through Contrastive Learning'
    group: '上海交大 BCMI Lab (吕宝粮组)'
    group_en: 'BCMI Lab (Lu Bao-Liang Lab), Shanghai Jiao Tong University'
    year: 2025
    tag: 'CN'
    desc: '通过 contrastive learning 把训练时多模态依赖降为推理时单模态——降低部署成本。'
    desc_en: 'Uses contrastive learning to reduce a model''s reliance on multiple modalities at training time to a single modality at inference, lowering deployment cost.'
  - title: 'Personalized Sleep Staging Leveraging Source-Free Unsupervised Domain Adaptation'
    group: '浙江大学脑机智能国家重点实验室 (潘纲组)'
    group_en: 'State Key Laboratory of Brain-Machine Intelligence (Pan Gang Lab), Zhejiang University'
    year: 2025
    tag: 'CN'
    desc: 'EEG睡眠分期个性化适应。Source-free UDA——目标域适应时无需访问源域数据。'
    desc_en: 'Personalizes EEG sleep staging via source-free unsupervised domain adaptation, requiring no access to source data when adapting to the target domain.'
  - title: 'Generalizable Sleep Staging via Multi-level Domain Alignment'
    group: '浙江大学脑机智能国家重点实验室 (潘纲组)'
    group_en: 'State Key Laboratory of Brain-Machine Intelligence (Pan Gang Lab), Zhejiang University'
    year: 2024
    tag: 'CN'
    desc: '多层级domain alignment用于跨数据集睡眠分期泛化。CCF-A录用，CBraMod前作。'
    desc_en: 'Uses multi-level domain alignment to generalize sleep staging across datasets; a CCF-A accepted precursor to CBraMod.'
  - title: 'BrainVis: Exploring the Bridge between Brain and Visual Signals via Image Reconstruction'
    group: '香港科技大学（广州）+ 南洋理工 (Hao Wang组)'
    group_en: 'Hao Wang Lab, HKUST (Guangzhou) and Nanyang Technological University'
    year: 2024
    tag: 'CN'
    desc: 'EEG → image reconstruction。Time/frequency-domain feature + CLIP coarse+fine-grained semantic插值对齐 + cascaded diffusion。仅10%训练数据即超SOTA。'
    desc_en: 'Reconstructs images from EEG by aligning time- and frequency-domain features with coarse- and fine-grained CLIP semantics and a cascaded diffusion model, surpassing SOTA with only 10% of the training data.'
  - title: 'Towards Voice Reconstruction from EEG during Imagined Speech'
    group: 'Seong-Whan Lee组/高丽大学'
    group_en: 'Seong-Whan Lee Group, Korea University'
    year: 2023
    tag: 'INTL'
    desc: 'NeuroTalk:将想象语音的非侵入式脑信号转换为用户本人语音,以朗读语音EEG训练并泛化到想象语音域。'
    desc_en: 'NeuroTalk: converts non-invasive imagined-speech brain signals into the user''s own voice, training on spoken-speech EEG and generalizing to the imagined-speech domain.'
  - title: 'Open Vocabulary Electroencephalography-to-Text Decoding and Zero-Shot Sentiment Classification'
    group: '季姮组/伊利诺伊大学香槟分校'
    group_en: 'Ji Heng Group, University of Illinois Urbana-Champaign (UIUC)'
    year: 2022
    tag: 'INTL'
    desc: '提出EEG2TEXT,引入EEG预训练与多视角Transformer建模不同脑区,实现开放词表EEG-to-Text解码与零样本情感分类。'
    desc_en: 'Proposes EEG2TEXT with EEG pre-training and a multi-view Transformer over brain regions for open-vocabulary EEG-to-text decoding and zero-shot sentiment classification.'
  - title: 'Plug-and-play Domain Adaptation for Cross-subject EEG-based Emotion Recognition'
    group: '上海交大 BCMI Lab (吕宝粮组)'
    group_en: 'BCMI Lab (Lu Bao-Liang Lab), Shanghai Jiao Tong University'
    year: 2021
    tag: 'CN'
    desc: '即插即用domain adaptation，2021年AAAI——跨被试EEG情感识别的标志性工作之一。'
    desc_en: 'A plug-and-play domain adaptation method (AAAI 2021) that became a landmark work for cross-subject EEG emotion recognition.'

ijcai27:
  - title: 'Towards Recognizing Spatial-temporal Collaboration of EEG Phase Brain Networks for Emotion Understanding'
    group: '宋美娜/欧中红组/北京邮电大学'
    group_en: 'Song & Ou Group, Beijing University of Posts and Telecommunications (BUPT)'
    year: 2025
    tag: 'CN'
    desc: '提出Stella框架(自适应频带选择+傅里叶图算子+时空编码器),建模EEG相位脑网络的时空协同用于情绪理解。'
    desc_en: 'Proposes the Stella framework (adaptive band selection + Fourier graph operator + spatial-temporal encoder) to model spatial-temporal collaboration of EEG phase brain networks for emotion understanding.'
  - title: 'VSGT: Variational Spatial and Gaussian Temporal Graph Models for EEG-based Emotion Recognition'
    group: '中国(EEG情绪识别团队)'
    group_en: 'VSGT authors (EEG emotion recognition team, China)'
    year: 2024
    tag: 'CN'
    desc: '提出变分空间与高斯时序图模型,联合建模EEG的空间结构与时间动态,用于EEG情绪识别。'
    desc_en: 'Proposes variational spatial and Gaussian temporal graph models to jointly capture spatial structure and temporal dynamics of EEG for emotion recognition.'
  - title: 'DBPNet: Dual-Branch Parallel Network with Temporal-Frequency Fusion for Auditory Attention Detection'
    group: '中国(听觉注意解码团队)'
    group_en: 'DBPNet authors (auditory attention decoding team, China)'
    year: 2024
    tag: 'CN'
    desc: '双分支并行网络融合时-频特征,用于从EEG中检测多说话人环境下被注意的说话人(听觉注意解码)。'
    desc_en: 'A dual-branch parallel network with temporal-frequency fusion for auditory attention detection from EEG in multi-talker settings.'
  - title: 'CoCoG: Controllable Visual Stimuli Generation Based on Human Concept Representations'
    group: '南方科技大学 NCC Lab (刘泉影组)'
    group_en: 'NCC Lab (Liu Quanying Lab), Southern University of Science and Technology'
    year: 2024
    tag: 'CN'
    desc: '基于human concept表征的可控视觉刺激生成——为脑活动decoding研究服务的视觉刺激控制工具。'
    desc_en: 'Generates controllable visual stimuli from human concept representations, serving as a stimulus-control tool for brain-activity decoding research.'
  - title: 'Mirror Contrastive Loss + Sliding Window Transformer for MI'
    group: 'IJCAI 2024 Jeju, HBAI Workshop'
    group_en: 'HBAI Workshop, IJCAI 2024 (Jeju)'
    year: 2024
    tag: 'Workshop'
    desc: 'Subject-independent MI分类，BCI Competition IV 2a/2b验证。HBAI workshop是IJCAI上BCI主题主要聚集地。'
    desc_en: 'Subject-independent motor-imagery classification combining a mirror contrastive loss with a sliding-window Transformer, validated on BCI Competition IV 2a/2b; the HBAI workshop is IJCAI''s main hub for BCI research.'

kdd27:
  - title: 'Brant-X: A Unified Physiological Signal Alignment Framework'
    group: '杨洋组/浙江大学'
    group_en: 'Yang Yang Group, Zhejiang University'
    year: 2024
    tag: 'CN'
    desc: '统一的生理信号对齐框架,把脑信号基座模型 Brant-2 快速适配到 EOG/ECG/EMG 等稀有生理信号下游任务。'
    desc_en: 'A unified physiological-signal alignment framework that rapidly adapts the Brant-2 brain foundation model to downstream tasks on rare signals (EOG/ECG/EMG).'
  - title: 'MBrain: A Multi-channel Self-Supervised Learning Framework for Brain Signals'
    group: '杨洋组/浙江大学'
    group_en: 'Yang Yang Group, Zhejiang University'
    year: 2023
    tag: 'CN'
    desc: '多通道自监督框架,学习不同脑区信号间的时空相关性,实现跨病人迁移的脑信号表征。'
    desc_en: 'A multi-channel self-supervised framework capturing spatiotemporal correlations across brain regions for transferable brain-signal representations across patients.'
  - title: 'R-Mixup: Riemannian Mixup for Biological Networks'
    group: 'Carl Yang 组/Emory University(郭英组合作)'
    group_en: 'Carl Yang Group, Emory University'
    year: 2023
    tag: 'INTL'
    desc: '针对脑连接组等 SPD 生物网络的黎曼流形 Mixup 数据增强,在脑功能网络分类等任务上有效缓解过拟合。'
    desc_en: 'A Riemannian-manifold Mixup augmentation tailored to SPD biological networks (e.g. brain connectomes), mitigating overfitting on brain-network classification.'
  - title: 'BrainNet: Epileptic Wave Detection from SEEG with Hierarchical Graph Diffusion Learning'
    group: '杨洋组/浙江大学(与 Carl Yang/Emory 合作)'
    group_en: 'Yang Yang Group, Zhejiang University (with Carl Yang, Emory)'
    year: 2022
    tag: 'CN'
    desc: '用分层图扩散学习从颅内 SEEG 信号检测癫痫波,建模脑波在脑区间的动态扩散网络,该组脑信号系列开山之作。'
    desc_en: 'Detects epileptic waves from intracranial SEEG via hierarchical graph diffusion learning, modeling dynamic wave-propagation networks across brain regions; the group''s foundational brain-signal work.'

www27:
  - title: 'Towards a Better Understanding of Human Reading Comprehension with Brain Signals'
    group: '刘奕群/张敏组/清华大学'
    group_en: 'Yiqun Liu & Min Zhang Group, Tsinghua University'
    year: 2022
    tag: 'CN'
    desc: '用 EEG 研究阅读理解中的脑活动,提出统一 EEG 阅读理解建模框架(UERCM),用于答案句分类与抽取。'
    desc_en: 'Studies brain activity during reading comprehension with EEG and proposes a unified EEG reading-comprehension modeling framework for answer classification and extraction.'
  - title: 'Collaborative Filtering with Preferences Inferred from Brain Signals'
    group: 'Tuukka Ruotsalo 组/哥本哈根大学 & 赫尔辛基大学'
    group_en: 'Tuukka Ruotsalo Group, University of Copenhagen & University of Helsinki'
    year: 2021
    tag: 'INTL'
    desc: '通过脑机接口从 EEG 推断用户偏好,并将其用于协同过滤推荐,验证可直接从脑信号预测个人喜好。'
    desc_en: 'Infers user preferences from EEG via a BCI and uses them in collaborative-filtering recommendation, showing preferences can be predicted directly from brain signals.'

sigir27:
  - title: 'Towards Brain Passage Retrieval: An Investigation of EEG Query Representations'
    group: 'Yashar Moshfeghi 组/斯特拉斯克莱德大学'
    group_en: 'Yashar Moshfeghi Group, University of Strathclyde'
    year: 2025
    tag: 'INTL'
    desc: '探索用 EEG 直接作为查询表征进行段落检索,研究脑信号查询表征的可行性。'
    desc_en: 'Investigates using EEG directly as query representations for passage retrieval, probing the feasibility of brain-signal query representations.'
  - title: 'An EEG Dataset of Word-level Brain Responses for Semantic Text Relevance'
    group: 'Tuukka Ruotsalo 组/赫尔辛基大学 & 哥本哈根大学'
    group_en: 'Tuukka Ruotsalo Group, University of Helsinki & University of Copenhagen'
    year: 2025
    tag: 'INTL'
    desc: '发布词级别脑响应 EEG 数据集,用于研究语义文本相关性的神经关联。'
    desc_en: 'Releases a word-level brain-response EEG dataset for studying neural correlates of semantic text relevance.'
  - title: 'Improving Legal Case Retrieval with Brain Signals'
    group: '刘奕群组/清华大学(泉城实验室)'
    group_en: 'Yiqun Liu Group, Tsinghua University (Quan Cheng Laboratory)'
    year: 2023
    tag: 'CN'
    desc: '构建带 EEG 的法律案例检索数据集,用脑信号做相关性反馈,提升法律检索的用户满意度。'
    desc_en: 'Builds a legal-case-retrieval dataset with EEG and uses brain signals for relevance feedback, improving user satisfaction in legal case retrieval.'
  - title: 'Why Don''t You Click: Understanding Non-Click Results in Web Search with Brain Signals'
    group: '刘奕群/张敏组/清华大学'
    group_en: 'Yiqun Liu & Min Zhang Group, Tsinghua University'
    year: 2022
    tag: 'CN'
    desc: '用 EEG 解析网页搜索中“零点击”结果的有用性判断,结合脑信号提升非点击结果的有用性估计。'
    desc_en: 'Uses EEG to analyze usefulness judgments of zero-click web-search results, improving usefulness estimation of non-click results with brain signals.'

icdm27:
  - title: 'SplitSEE: A Splittable Self-supervised Framework for Single-Channel EEG Representation Learning'
    group: '樱井保志/松原靖子组/大阪大学'
    group_en: 'Sakurai & Matsubara Lab, Osaka University'
    year: 2024
    tag: 'INTL'
    desc: '可结构拆分的单通道 EEG 自监督框架,在时域/频域分别学习并通过深度聚类对齐,用于癫痫预测与睡眠分期。'
    desc_en: 'A structurally splittable self-supervised framework for single-channel EEG that learns temporal and frequency views aligned via deep clustering, for seizure prediction and sleep staging.'

sdm27:
  - title: 'A Two-View EEG Representation for Brain Cognition by Composite Temporal-Spatial Contrastive Learning'
    group: 'Zheng Chen 等/大阪大学'
    group_en: 'Zheng Chen et al., Osaka University'
    year: 2023
    tag: 'INTL'
    desc: '用复合时空对比学习从高噪声 EEG 中提取可靠表征,在睡眠分期与致命癫痫预测上验证。'
    desc_en: 'Extracts reliable EEG representations from noisy signals via composite temporal-spatial contrastive learning, validated on sleep staging and lethal-seizure prediction.'

ijcnn27:
  - title: 'Adaptive Hierarchical Graph Convolutional Network for EEG Emotion Recognition'
    group: '郑文明组, 东南大学 (Xue, Zheng, Zong, Chang, Jiang)'
    group_en: 'Zheng Wenming Lab, Southeast University'
    year: 2022
    tag: 'CN'
    desc: '自适应分层图卷积网络,用可学习池化自动划分脑区并建模通道/脑区间功能连接,代表性图神经网络EEG情绪工作(IEEE Xplore已验证)。'
    desc_en: 'An adaptive hierarchical graph convolutional network that uses learnable pooling to automatically partition brain regions and model functional connectivity across channels and regions, a representative GNN approach to EEG emotion recognition.'
  - title: 'MPnnet: a Motion Planning Decoding Convolutional Neural Network for EEG-based Brain Computer Interfaces'
    group: 'Morabito 组/地中海大学(意大利)'
    group_en: 'Morabito Group, University Mediterranea of Reggio Calabria'
    year: 2021
    tag: 'INTL'
    desc: '用于 EEG 脑机接口运动规划解码的卷积神经网络 MPnnet。'
    desc_en: 'MPnnet, a convolutional neural network for motion-planning decoding in EEG-based brain-computer interfaces.'

iconip27:
  - title: 'A Multi-task Emotion Recognition Model Based on Continuously Labeled EEG Signals'
    group: '吕宝粮/郑伟龙组/上海交通大学'
    group_en: 'Bao-Liang Lu & Wei-Long Zheng Group, Shanghai Jiao Tong University'
    year: 2024
    tag: 'CN'
    desc: '基于连续标注 EEG 信号的多任务情绪识别模型。'
    desc_en: 'A multi-task emotion recognition model built on continuously labeled EEG signals.'
  - title: 'Multi-View Fusion Transformer for Emotion Recognition Under Sleep Deprivation'
    group: '吕宝粮/郑伟龙组, 上海交通大学 BCMI (Tian, Li, Lu, Zheng)'
    group_en: 'Lu Bao-Liang / Zheng Wei-Long Lab, BCMI, Shanghai Jiao Tong University'
    year: 2024
    tag: 'CN'
    desc: '针对睡眠剥夺这一现实退化场景,用多视图融合Transformer做EEG情绪识别,关注非理想生理状态下的鲁棒解码。'
    desc_en: 'Applies a multi-view fusion Transformer to EEG emotion recognition under sleep deprivation, focusing on robust decoding in non-ideal physiological states.'
  - title: 'Two-Stream Spectral-Temporal Denoising Network for End-to-End Robust EEG-Based Emotion Recognition'
    group: '吕宝粮/郑伟龙组/上海交通大学'
    group_en: 'Bao-Liang Lu & Wei-Long Zheng Group, Shanghai Jiao Tong University'
    year: 2023
    tag: 'CN'
    desc: '双流谱-时去噪网络,端到端提升 EEG 情绪识别对噪声的鲁棒性。'
    desc_en: 'A two-stream spectral-temporal denoising network for end-to-end robust EEG-based emotion recognition.'
  - title: 'Naturalistic Emotion Recognition Using EEG and Eye Movements'
    group: '吕宝粮/郑伟龙组/上海交通大学'
    group_en: 'Bao-Liang Lu & Wei-Long Zheng Group, Shanghai Jiao Tong University'
    year: 2023
    tag: 'CN'
    desc: '结合 EEG 与眼动的多模态自然情绪识别。'
    desc_en: 'Multimodal naturalistic emotion recognition combining EEG and eye-movement signals.'
  - title: 'DAformer: Transformer with Domain Adversarial Adaptation for EEG-Based Emotion Recognition with Live-Oil Paintings'
    group: '吕宝粮/郑伟龙组/上海交通大学'
    group_en: 'Bao-Liang Lu & Wei-Long Zheng Group, Shanghai Jiao Tong University'
    year: 2023
    tag: 'CN'
    desc: '带域对抗自适应的 Transformer,用于油画刺激下的跨域 EEG 情绪识别。'
    desc_en: 'A domain-adversarial Transformer for cross-domain EEG-based emotion recognition under live-oil-painting stimuli.'
  - title: 'Few-Shot Class-Incremental Learning for EEG-Based Emotion Recognition'
    group: '吕宝粮/郑伟龙组/上海交通大学'
    group_en: 'Bao-Liang Lu & Wei-Long Zheng Group, Shanghai Jiao Tong University'
    year: 2022
    tag: 'CN'
    desc: '面向 EEG 情绪识别的小样本类增量学习方法。'
    desc_en: 'A few-shot class-incremental learning method for EEG-based emotion recognition.'
  - title: 'Measuring Decision Confidence Levels from EEG Using a Spectral-Spatial-Temporal Adaptive Graph Convolutional Neural Network'
    group: 'Rui Li, Yiting Wang 等 (BCMI 相关)'
    group_en: 'Rui Li, Yiting Wang et al. (BCMI-affiliated)'
    year: 2022
    tag: 'CN'
    desc: '用谱-空-时自适应图卷积网络从EEG解码决策置信度,把BCI从情绪扩展到认知状态评估。'
    desc_en: 'Decodes decision confidence from EEG with a spectral-spatial-temporal adaptive graph convolutional network, extending BCI from emotion to cognitive-state assessment.'
  - title: 'A Cross-subject and Cross-modal Model for Multimodal Emotion Recognition'
    group: '吕宝粮组, 上海交通大学 BCMI (Zhang, Yan, Li, Zhao, Liu, Li, Lu)'
    group_en: 'Lu Bao-Liang Lab, BCMI, Shanghai Jiao Tong University'
    year: 2021
    tag: 'CN'
    desc: '同时处理跨被试与跨模态的多模态情绪识别模型,提升EEG+其他模态在新被试上的迁移泛化。'
    desc_en: 'A multimodal emotion-recognition model handling both cross-subject and cross-modal settings, improving transfer of EEG plus other modalities to new subjects.'

cvpr27:
  - title: 'Neuro-3D: Towards 3D Visual Decoding from EEG Signals'
    group: '国内高校团队(郭等)'
    group_en: 'Guo et al.'
    year: 2025
    tag: 'CN'
    desc: '首次从 EEG 解码 3D 视觉感知,提出 EEG-3D 数据集与基于扩散的彩色点云解码器重建带色彩 3D 物体。'
    desc_en: 'First to decode 3D visual perception from EEG; introduces the EEG-3D dataset and a diffusion-based colored point-cloud decoder reconstructing shape and color.'
  - title: 'NSD-Imagery: A Benchmark Dataset for Extending fMRI Vision Decoding Methods to Mental Imagery'
    group: 'Kneeland 等(美国研究团队)'
    group_en: 'Kneeland et al.'
    year: 2025
    tag: 'INTL'
    desc: '提出心理想象 fMRI 基准数据集,系统评测 MindEye1/2、Brain Diffuser 等模型在心理想象重建上的泛化能力。'
    desc_en: 'Introduces a mental-imagery fMRI benchmark and evaluates how MindEye1/2, Brain Diffuser and others generalize from seen-image to mental-imagery reconstruction.'
  - title: 'MindBridge: A Cross-Subject Brain Decoding Framework'
    group: '浙江大学等'
    group_en: 'Zhejiang University et al.'
    year: 2024
    tag: 'Highlight'
    desc: '单一模型实现跨被试脑解码,通过循环 fMRI 重建与 reset-tuning 适配新被试,CVPR 2024 Highlight。'
    desc_en: 'A single model for cross-subject brain decoding using cyclic fMRI reconstruction and reset-tuning for new-subject adaptation; CVPR 2024 Highlight.'
  - title: 'Psychometry: An Omnifit Model for Image Reconstruction from Human Brain Activity'
    group: '浙江大学(王文冠/杨易)等'
    group_en: 'Zhejiang University (Wang/Yang) et al.'
    year: 2024
    tag: 'CN'
    desc: '用 Omni 混合专家(MoE)+ 检索增强推理(Ecphory)做跨被试统一图像重建模型。'
    desc_en: 'An omnifit cross-subject image-reconstruction model with an Omni mixture-of-experts module and retrieval-enhanced (Ecphory) inference.'
  - title: 'Brain Decodes Deep Nets'
    group: 'Huzheng Yang, James Gee, Jianbo Shi / 宾夕法尼亚大学'
    group_en: 'Huzheng Yang, James Gee, Jianbo Shi, University of Pennsylvania'
    year: 2024
    tag: 'INTL'
    desc: '反向利用脑编码:用预测 fMRI 的任务把大型视觉模型''画''到大脑皮层上(FactorTopy),揭示不同训练方法导致的层级组织差异,是脑科学与可解释性的有趣交叉。'
    desc_en: 'Inverts brain encoding to ''paint'' large vision models onto the cortex (FactorTopy) via fMRI-prediction tasks, revealing how different training methods shape hierarchical organization, a compelling crossover of neuroscience and interpretability.'
  - title: 'Seeing Beyond the Brain: Conditional Diffusion Model with Sparse Masked Modeling for Vision Decoding (MinD-Vis)'
    group: '新加坡国立大学(NUS)/周思珏(Juan Helen Zhou)组'
    group_en: 'National University of Singapore (Zhou Lab)'
    year: 2023
    tag: 'CN'
    desc: '用稀疏掩码脑建模 + 双条件潜在扩散模型从 fMRI 解码视觉,是 fMRI-to-image 扩散时代的奠基代表作之一。'
    desc_en: 'Sparse masked brain modeling plus a double-conditioned latent diffusion model to decode vision from fMRI; a foundational work of the diffusion-era fMRI-to-image line.'
  - title: 'High-Resolution Image Reconstruction with Latent Diffusion Models from Human Brain Activity'
    group: '大阪大学 / 量子科学技术研究开发机构(Takagi & Nishimoto)'
    group_en: 'Osaka University / NICT (Takagi & Nishimoto)'
    year: 2023
    tag: 'INTL'
    desc: '用 Stable Diffusion 直接从 fMRI 重建高分辨率自然图像,极简流程且影响力极大的标志性工作。'
    desc_en: 'Reconstructs high-resolution natural images directly from fMRI using Stable Diffusion; a remarkably simple yet highly influential landmark work.'

iccv27:
  - title: 'Exploring the Visual Feature Space for Multimodal Neural Decoding (VINDEX)'
    group: '伦敦大学学院 / 剑桥大学(Weihao Xia、Cengiz Öztireli)'
    group_en: 'UCL / University of Cambridge (Xia & Öztireli)'
    year: 2025
    tag: 'INTL'
    desc: '分析 MLLM 内视觉特征空间,提出 VINDEX 零样本多模态脑解码,并建立 MG-BrainDub 多粒度理解基准。'
    desc_en: 'Analyzes vision feature spaces inside MLLMs and proposes VINDEX, a zero-shot multimodal brain-decoding method, with the MG-BrainDub benchmark.'
  - title: 'Beyond Brain Decoding: Visual-Semantic Reconstructions to Mental Creation Extension Based on fMRI (NeuroCreat)'
    group: '西安交通大学 人机混合增强智能全国重点实验室(郑南宁组)/ 西北工业大学'
    group_en: 'Xi''an Jiaotong University (Zheng Lab) / Northwestern Polytechnical University'
    year: 2025
    tag: 'CN'
    desc: '提出 NeuroCreat 框架,将脑解码扩展到从视觉工作记忆中提取意图进行创造性多模态生成。'
    desc_en: 'Proposes NeuroCreat, extending brain decoding to a creative ''mental creation'' task that extracts intentional tendencies from visual working memory for multimodal generation.'

eccv28:
  - title: 'UMBRAE: Unified Multimodal Brain Decoding'
    group: '伦敦大学学院 / Inria / 剑桥大学(Weihao Xia 等)'
    group_en: 'UCL / Inria / University of Cambridge (Xia et al.)'
    year: 2024
    tag: 'INTL'
    desc: '提出通用脑编码器 + 跨被试训练,用 MLLM 恢复多粒度物体描述与空间信息,并发布 BrainHub 基准。'
    desc_en: 'A universal brain encoder with cross-subject training that recovers multi-granularity object descriptions and spatial detail via MLLMs; releases the BrainHub benchmark.'
  - title: 'NeuroPictor: Refining fMRI-to-Image Reconstruction via Multi-individual Pretraining and Multi-level Modulation'
    group: '复旦大学等'
    group_en: 'Fudan University et al.'
    year: 2024
    tag: 'CN'
    desc: '直接用 fMRI 调制扩散模型 U-Net 的内部特征图,多被试预训练 + 多层次调制实现高低层联合控制。'
    desc_en: 'Directly modulates internal U-Net feature maps of diffusion models with fMRI, combining multi-individual pretraining and multi-level (high/low) conditioning.'
  - title: 'DreamDiffusion: High-Quality EEG-to-Image Generation with Temporal Masked Signal Modeling and CLIP Alignment'
    group: '腾讯 / 国内团队(Bai 等)'
    group_en: 'Tencent / Bai et al.'
    year: 2024
    tag: 'CN'
    desc: '用时序掩码信号建模预训练 EEG 编码器,并以 CLIP 对齐 EEG-文本-图像,直接从 EEG 生成高质量图像。'
    desc_en: 'Pretrains an EEG encoder with temporal masked signal modeling and aligns EEG-text-image via CLIP to generate high-quality images directly from EEG.'
  - title: 'MinD-3D: Reconstruct High-Quality 3D Objects in Human Brain'
    group: '复旦大学(Yanwei Fu / Jianfeng Feng)等'
    group_en: 'Fudan University (Fu / Feng) et al.'
    year: 2024
    tag: 'CN'
    desc: '提出 Recon3DMind 任务与三阶段框架,首次从 fMRI 解码并重建高质量 3D 物体。'
    desc_en: 'Introduces the Recon3DMind task and a three-stage framework to decode and reconstruct high-quality 3D objects from fMRI for the first time.'

acmmm27:
  - title: 'BrainFLORA: Uncovering Brain Concept Representation via Multimodal Neural Embeddings'
    group: '南方科技大学 NCC Lab(刘泉影组)'
    group_en: 'NCC Lab, Southern University of Science and Technology (SUSTech)'
    year: 2025
    tag: 'CN'
    desc: '统一框架整合 EEG/MEG/fMRI 多模态神经影像,构建共享脑概念表征,连接神经科学与机器学习。'
    desc_en: 'A unified framework integrating EEG/MEG/fMRI neuroimaging into a shared neural representation to uncover the brain''s visual concept structure.'
  - title: 'MB2C: Multimodal Bidirectional Cycle Consistency for Learning Robust Visual Neural Representations'
    group: '上海海事大学 等'
    group_en: 'Shanghai Maritime University et al.'
    year: 2024
    tag: 'CN'
    desc: '用双 GAN 双向循环一致性缩小 EEG 与图像/文本模态鸿沟,提升脑视觉表征鲁棒性(ThingsEEG/EEGCVPR40)。'
    desc_en: 'Uses dual-GAN bidirectional cycle consistency to close the modality gap between EEG and visual/text features for robust visual neural representations.'
  - title: 'REmoNet: Reducing Emotional Label Noise via Multi-regularized Self-supervision'
    group: '上海交通大学 BCMI 实验室(吕宝粮组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu)'
    year: 2024
    tag: 'CN'
    desc: '用多正则自监督缓解 EEG 情感识别中的标签噪声问题。'
    desc_en: 'Reduces emotional label noise in EEG-based emotion recognition via multi-regularized self-supervision.'
  - title: 'Multimodal Physiological Signals Representation Learning via Multiscale Contrasting for Depression Recognition'
    group: '国内组 (arXiv 2406.16968)'
    group_en: 'Chinese research group (arXiv 2406.16968)'
    year: 2024
    tag: 'CN'
    desc: 'Siamese多尺度对比框架联合fNIRS与EEG,做时空对比+语义一致性对比,用于抑郁识别的多模态生理信号表征学习。'
    desc_en: 'A Siamese multi-scale contrastive framework that jointly models fNIRS and EEG with spatiotemporal and semantic-consistency contrasting for depression recognition.'
  - title: 'MindDiffuser: Controlled Image Reconstruction from Human Brain Activity with Semantic and Structural Diffusion'
    group: '中科院自动化所 何晖光组'
    group_en: 'Institute of Automation, Chinese Academy of Sciences (He Lab)'
    year: 2023
    tag: 'CN'
    desc: '两阶段从 fMRI 重建视觉刺激,用 Stable Diffusion 对齐语义与结构信息,在 NSD 数据集上超越当时 SOTA。'
    desc_en: 'Two-stage fMRI-to-image reconstruction using Stable Diffusion to align both semantic and structural features, surpassing prior SOTA on the NSD dataset.'
  - title: 'Multimodal Adaptive Emotion Transformer with Flexible Modality Inputs on A Novel Dataset with Continuous Labels'
    group: '上海交通大学 BCMI 实验室(吕宝粮/郑伟龙组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu/Zheng)'
    year: 2023
    tag: 'CN'
    desc: '提出 MAET 框架,灵活融合 EEG 与眼动模态,并发布带连续标签的情感数据集。'
    desc_en: 'Proposes MAET, a flexible Transformer fusing EEG and eye-movement modalities, alongside a new continuous-label emotion dataset.'
  - title: 'Graph to Grid: Learning Deep Representations for Multimodal Emotion Recognition'
    group: '吕宝粮组/上海交大 BCMI (含郑伟龙)'
    group_en: 'Lu Bao-Liang Lab, BCMI, Shanghai Jiao Tong University (incl. Zheng Wei-Long)'
    year: 2023
    tag: 'CN'
    desc: '提出即插即用的G2G模块,将1D图结构EEG数据经数值关系编码转为2D网格,便于CNN处理,用于EEG+眼动多模态情感识别。'
    desc_en: 'Proposes a plug-and-play G2G module that converts 1D graph-structured EEG into 2D grids via numerical relation encoding for CNN processing, applied to EEG-plus-eye-movement multimodal emotion recognition.'
  - title: 'Simplifying Multimodal Emotion Recognition with Single Eye Movement Modality'
    group: '上海交通大学 BCMI 实验室(吕宝粮组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu)'
    year: 2021
    tag: 'CN'
    desc: '探讨用单一眼动模态简化多模态(含 EEG)情感识别系统。'
    desc_en: 'Explores simplifying multimodal (incl. EEG) emotion recognition down to a single eye-movement modality.'

icme27:
  - title: 'Neural-MCRL: Neural Multimodal Contrastive Representation Learning for EEG-based Visual Decoding'
    group: '香港理工大学 等'
    group_en: 'The Hong Kong Polytechnic University et al.'
    year: 2025
    tag: 'CN'
    desc: '通过语义桥接与跨注意力实现 EEG 视觉解码的多模态对齐,并提出 NESTA 谱-时自适应编码器。'
    desc_en: 'Achieves multimodal alignment for EEG visual decoding via semantic bridging and cross-attention, with a spectral-temporal adaptive encoder (NESTA).'

icip27:
  - title: 'EEG Based Visual Classification With Multi-Feature Joint Learning'
    group: 'Ma et al. (ICIP 2021)'
    group_en: 'Ma et al. (ICIP 2021)'
    year: 2021
    tag: 'INTL'
    desc: '多特征联合学习从EEG做视觉刺激分类,是ICIP上少数的脑信号视觉解码工作。'
    desc_en: 'Classifies visual stimuli from EEG via multi-feature joint learning, one of the few brain-signal visual-decoding works at ICIP.'

wacv27:
  - title: 'DREAM: Visual Decoding from Reversing Human Visual System'
    group: '伦敦大学学院 / Inria / 剑桥大学(Weihao Xia 等)'
    group_en: 'UCL / Inria / University of Cambridge (Xia et al.)'
    year: 2024
    tag: 'INTL'
    desc: '以人类视觉系统的层级与并行结构为先验,设计 R-VAC、R-PKM 反向通路从 fMRI 解码语义/颜色/深度。'
    desc_en: 'Uses the hierarchical and parallel structure of the human visual system as prior, designing R-VAC and R-PKM reverse pathways to decode semantics, color and depth from fMRI.'
  - title: 'Learning Robust Deep Visual Representations from EEG Brain Recordings (EEGStyleGAN-ADA)'
    group: '印度理工学院甘地讷格尔分校(IIT Gandhinagar)'
    group_en: 'IIT Gandhinagar'
    year: 2024
    tag: 'INTL'
    desc: '两阶段方法学习鲁棒 EEG 视觉表征,用 StyleGAN-ADA 从 EEG 合成图像,在多个 EEG 数据集上提升生成质量。'
    desc_en: 'A two-stage method learning robust EEG visual representations and using StyleGAN-ADA for EEG-to-image synthesis, improving generation across multiple EEG datasets.'

acii27:
  - title: 'Emotion Recognition Based on EEG Signals and Deep Neural Networks Architectures'
    group: 'Michalis Zervakis 组, Technical University of Crete (希腊)'
    group_en: 'Michalis Zervakis Lab, Technical University of Crete, Greece'
    year: 2024
    tag: 'INTL'
    desc: '系统比较多种深度网络架构在 EEG 情感识别上的表现,偏方法对比/基准。'
    desc_en: 'Systematically benchmarks a range of deep network architectures for EEG emotion recognition, with a method-comparison focus.'
  - title: 'Recognizing X from EEG: Is X Really Emotion?'
    group: 'Patrick Gebhard 组, DFKI (德国)'
    group_en: 'Patrick Gebhard Lab, DFKI, Germany'
    year: 2024
    tag: 'INTL'
    desc: '批判性反思:质疑 EEG 情感识别中所谓识别的到底是不是情绪,讨论标签与混淆变量问题,视角有价值。'
    desc_en: 'A critical reflection questioning whether EEG emotion recognition truly captures emotion, examining labeling and confounding-variable issues from a valuable skeptical angle.'
  - title: 'Context-Aware EEG-Based Perceived Stress Recognition based on Emotion Transition Paradigm'
    group: '蒋冬梅组 / 西北工业大学 (Jiyao Liu 等)'
    group_en: 'Jiang Dongmei Lab, Northwestern Polytechnical University (Jiyao Liu et al.)'
    year: 2023
    tag: 'CN'
    desc: '提出情绪转移范式,做情境感知的 EEG 主观压力识别,关注情绪动态过渡而非静态状态。'
    desc_en: 'Introduces an emotion-transition paradigm for context-aware EEG perceived-stress recognition, emphasizing emotional dynamics rather than static states.'
  - title: 'Deep Recurrent Semi-Supervised EEG Representation Learning for Emotion Recognition'
    group: 'Ali Etemad 组, Queen''s University (加拿大)'
    group_en: 'Ali Etemad Lab, Queen''s University, Canada'
    year: 2021
    tag: 'INTL'
    desc: '深度循环半监督 EEG 表征学习,利用大量无标注 EEG 提升情感识别,半监督方向被广泛引用。'
    desc_en: 'A deep recurrent semi-supervised EEG representation-learning method that leverages abundant unlabeled EEG to improve emotion recognition, widely cited in the semi-supervised line.'

icmi27:
  - title: 'Foundation Feature-Guided Hierarchical Fusion of EEG-Physiological for Emotion Estimation'
    group: 'Yukie Nagai 组, 东京大学'
    group_en: 'Yukie Nagai Lab, University of Tokyo'
    year: 2025
    tag: 'INTL'
    desc: '用基础模型特征引导 EEG 与外周生理信号的分层融合做情绪估计,多模态生理情感方向。'
    desc_en: 'Uses foundation-model features to guide hierarchical fusion of EEG and peripheral physiological signals for emotion estimation, a multimodal physiological-emotion approach.'
  - title: 'Across Trials vs Subjects vs Contexts: A Multi-Reservoir Computing Approach for EEG Variations in Emotion Recognition'
    group: 'Kantaro Fujiwara 组, 东京大学'
    group_en: 'Kantaro Fujiwara Lab, University of Tokyo'
    year: 2024
    tag: 'INTL'
    desc: '用多储备池计算(reservoir computing)系统分析 EEG 情感识别中跨试次/跨被试/跨情境的变异性。'
    desc_en: 'Employs multi-reservoir computing to systematically analyze across-trial, across-subject, and across-context variability in EEG emotion recognition.'
  - title: 'EEG-based Cognitive Load Classification using Feature Masked Autoencoding and Emotion Transfer Learning'
    group: 'Ali Etemad 组, Queen''s University (加拿大)'
    group_en: 'Ali Etemad Lab, Queen''s University, Canada'
    year: 2023
    tag: 'INTL'
    desc: '用特征掩码自编码 + 情感迁移学习做 EEG 认知负荷分类,跨任务迁移思路新颖。'
    desc_en: 'Classifies EEG cognitive load using feature masked autoencoding plus emotion transfer learning, a novel cross-task transfer strategy.'

icassp27:
  - title: 'STAR: A Spatial-Temporal Autoencoder for EEG Restoration in Emotion Recognition'
    group: '上海交通大学 BCMI 实验室(吕宝粮/郑伟龙组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu/Zheng)'
    year: 2025
    tag: 'CN'
    desc: '空间-时间自编码器用于 EEG 信号修复,提升情感识别性能。'
    desc_en: 'A spatial-temporal autoencoder for EEG signal restoration to improve emotion recognition.'
  - title: 'Gram: A Large-Scale General EEG Model for Raw Data Classification and Restoration Tasks'
    group: '上海交通大学 BCMI 实验室(吕宝粮/郑伟龙组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu/Zheng)'
    year: 2025
    tag: 'CN'
    desc: '大规模通用 EEG 模型,统一处理原始 EEG 数据的分类与修复任务。'
    desc_en: 'A large-scale general EEG model handling raw-data classification and restoration tasks in a unified way.'
  - title: 'Multi-Source Multi-Target Domain Similarity Network for Cross-Cultural EEG Emotion Recognition'
    group: '吕宝粮/郑伟龙组, 上海交通大学 BCMI'
    group_en: 'Lu Bao-Liang / Zheng Wei-Long Lab, BCMI, Shanghai Jiao Tong University'
    year: 2025
    tag: 'CN'
    desc: '多源多目标域相似性网络,解决跨文化(跨国受试)EEG 情感识别的域偏移问题。'
