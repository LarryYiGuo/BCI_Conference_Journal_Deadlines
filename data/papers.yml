  - title: 'Multi-Scale Attention-Based Dense Spatial-Temporal Model for Emotion Induction in Response to Olfactory Stimuli'
    group: '吕宝粮/郑伟龙组, 上海交通大学 BCMI'
    group_en: 'Lu Bao-Liang / Zheng Wei-Long Lab, BCMI, Shanghai Jiao Tong University'
    year: 2025
    tag: 'CN'
    desc: '多尺度注意力时空模型,研究嗅觉刺激诱发情绪的 EEG 解码,拓展非视听情绪诱发范式。'
    desc_en: 'A multi-scale attention-based spatiotemporal model for decoding EEG emotion induced by olfactory stimuli, extending beyond audiovisual elicitation paradigms.'
  - title: 'CEMOAE: A Dynamic Autoencoder with Masked Channel Modeling for Robust EEG-Based Emotion Recognition'
    group: '上海交通大学 BCMI 实验室(吕宝粮/郑伟龙组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu/Zheng)'
    year: 2024
    tag: 'CN'
    desc: '动态自编码器结合掩码通道建模,提升 EEG 情感识别在通道缺失下的鲁棒性。'
    desc_en: 'A dynamic autoencoder with masked channel modeling for robust EEG-based emotion recognition under channel loss.'
  - title: 'Functional Emotion Transformer for EEG-Assisted Cross-Modal Emotion Recognition'
    group: '上海交通大学 BCMI 实验室(吕宝粮/郑伟龙组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu/Zheng)'
    year: 2024
    tag: 'CN'
    desc: '功能性情感 Transformer,用 EEG 辅助跨模态情感识别。'
    desc_en: 'A functional emotion Transformer that uses EEG to assist cross-modal emotion recognition.'
  - title: 'Multimodal Multi-View Spectral-Spatial-Temporal Masked Autoencoder for Self-Supervised Emotion Recognition'
    group: '上海交通大学 BCMI 实验室(吕宝粮/郑伟龙组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu/Zheng)'
    year: 2024
    tag: 'CN'
    desc: '多模态多视图谱-空-时掩码自编码器,自监督学习情感表征。'
    desc_en: 'A multimodal multi-view spectral-spatial-temporal masked autoencoder for self-supervised emotion recognition.'
  - title: 'Elastic Graph Transformer Networks for EEG-based Emotion Recognition'
    group: '上海交通大学 BCMI 实验室(吕宝粮/郑伟龙组)'
    group_en: 'BCMI Lab, Shanghai Jiao Tong University (Lu/Zheng)'
    year: 2023
    tag: 'CN'
    desc: '弹性图 Transformer 网络建模 EEG 通道关系用于情感识别。'
    desc_en: 'Elastic graph Transformer networks modeling EEG channel relations for emotion recognition.'
  - title: 'EEG2IMAGE: Image Reconstruction from EEG Brain Signals'
    group: '印度理工学院甘地讷格尔分校(IIT Gandhinagar)'
    group_en: 'IIT Gandhinagar, India'
    year: 2023
    tag: 'INTL'
    desc: '用对比学习提取 EEG 特征并以条件 GAN 从脑信号重建 128x128 图像。'
    desc_en: 'Extracts EEG features via contrastive learning and reconstructs 128x128 images from brain signals using a conditional GAN.'

eusipco27:
  - title: 'Continuous Speech Prediction by Segmentation of Auditory EEG'
