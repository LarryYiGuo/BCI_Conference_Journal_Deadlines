    desc_en: 'Uses a Transformer-CNN to automatically detect artifacts in scalp EEG for clinical EEG quality control (EMBC 2022).'
  - title: 'Gated Transformer for Decoding Human Brain EEG Signals'
    group: 'Amazon AWS(Yunzhe Tao 等)'
    group_en: 'Amazon AWS (Yunzhe Tao et al.)'
    year: 2021
    tag: 'INTL'
