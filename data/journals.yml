  impact_factor: 4.4
  oa: true
  note: MDPI 生物医学工程 OA 刊,工程技术大类 3 区,审稿约 1-2 个月,适合 EEG/BCI 康复、神经工程方法学论文;部分较新来源给出实时 IF 约 3.7,2024 JCR 官方为 4.4。
  note_en: MDPI biomedical-engineering OA journal, CAS engineering tier 3, ~1-2 month review; suits EEG/BCI rehabilitation and neural-engineering methods papers (2024 JCR IF 4.4; newer real-time estimates ~3.7).

- id: scientificdata
  title: Scientific Data
  full_name: Scientific Data
  publisher: Springer Nature (Nature Portfolio)
  link: 'https://www.nature.com/sdata/'
  sub: BME
  ccf: none
  cas: 2区
  jcr: Q1
  impact_factor: 6.9
  oa: true
  note: Nature 旗下专发 Data Descriptor 的金色 OA 数据期刊,综合性 2 区 / JCR Q1;发布并被正式引用 EEG/BCI 公开数据集的权威平台,数据集本身即可成为一篇可追溯、可引用的同行评审论文。
  note_en: Nature's gold-OA journal for peer-reviewed Data Descriptors; the authoritative venue for publishing and citing open EEG/BCI datasets, turning a dataset into a citable peer-reviewed publication.

- id: scientificreports
  title: Scientific Reports
  full_name: Scientific Reports
  publisher: Nature
  link: 'https://www.nature.com/srep/'
  sub: BME
  ccf: none
  cas: 3区
  jcr: Q1
  impact_factor: 3.9
  oa: true
  note: Nature 旗下综合性 OA 大刊,JCR 综合科学 Q1,但 2025 中科院由 2 区降至 3 区,接收门槛重技术严谨性,EEG/BCI 工程与实验研究常见去处,发文量极大。
  note_en: Nature multidisciplinary OA megajournal, JCR Q1 multidisciplinary, but downgraded to CAS tier 3 in 2025; soundness-based acceptance, common venue for EEG/BCI engineering and experimental work.

- id: journalofneuraleng
  title: Journal of Neural Engineering
  full_name: Journal of Neural Engineering
  publisher: IOP
  link: 'https://iopscience.iop.org/journal/1741-2552'
  sub: BME
  ccf: none
  cas: 3区
  jcr: Q2
  impact_factor: 3.7
  oa: false
  note: 神经工程领域旗舰刊,BCI 经典阵地,EEGNet 等里程碑算法发表于此;偏神经接口/解码方法。
  note_en: Flagship neural engineering journal and a classic BCI venue (EEGNet was published here); focus on neural interfaces and decoding methods.

- id: heliyon
  title: Heliyon
  full_name: Heliyon
  publisher: Elsevier
  link: 'https://www.cell.com/heliyon/home'
  sub: BME
  ccf: none
  cas: 4区
  jcr: Q1
  impact_factor: 3.6
  oa: true
  note: Cell Press/Elsevier 综合性 OA 刊,综合大类 4 区(小类综合 3 区),JCR Q1;注意 2024 年曾被 WoS 标记 On Hold、争议较多,投稿前需评估风险,可收 EEG/BCI 跨学科研究。
  note_en: Cell Press/Elsevier multidisciplinary OA journal, CAS broad-cat tier 4 (subcat. 3), JCR Q1; note WoS 'On Hold' flag in 2024 and quality concerns, assess risk before submitting; accepts interdisciplinary EEG/BCI work.

- id: ieeeaccess
  title: IEEE Access
  full_name: IEEE Access
  publisher: IEEE
  link: 'https://ieeeaccess.ieee.org/'
  sub: BME
  ccf: none
  cas: 4区
  jcr: Q1
  impact_factor: 3.4
  oa: true
  note: IEEE 综合性 OA 大刊,2024 JCR 仍 Q1,但 2025 中科院计算机大类降至 4 区,审稿快(数周),EEG/BCI 解码算法、深度学习与系统工程论文适配度高,发文量大。
  note_en: IEEE multidisciplinary OA megajournal, still JCR Q1 (2024) but downgraded to CAS computer-science tier 4 in 2025; fast review (weeks), good for EEG/BCI decoding, deep-learning and systems papers.

- id: jofneurosciencemet
  title: J. of Neuroscience Methods
  full_name: Journal of Neuroscience Methods
  publisher: Elsevier
  link: 'https://www.sciencedirect.com/journal/journal-of-neuroscience-methods'
  sub: BME
  ccf: none
  cas: 4区
  jcr: Q3
  impact_factor: 2.7
  oa: false
  note: 神经科学方法学期刊,EEG 采集/预处理/电极与分析方法类工作适配;影响因子与分区偏低。
  note_en: Neuroscience methodology journal; fits EEG acquisition/preprocessing/electrode and analysis-method work; lower impact factor and quartile.

- id: plosone
  title: PLOS ONE
  full_name: PLOS ONE
  publisher: PLOS
  link: 'https://journals.plos.org/plosone/'
  sub: BME
  ccf: none
  cas: 3区
  jcr: Q2
  impact_factor: 2.6
  oa: true
  note: PLOS 综合性 OA 大刊,综合大类 3 区,2024 JCR 由 Q1 降至 Q2,只审科学严谨性不看新颖性,EEG/BCI 实证与可重复性研究皆可投,发文量大、审稿周期偏长。
  note_en: PLOS megajournal, fully OA, CAS multidisciplinary tier 3 (dropped to Q2 in 2024 JCR); judges soundness not novelty, accepts EEG/BCI empirical and reproducibility work; high volume, longer review.

- id: braincomputerinter
  title: Brain-Computer Interfaces
  full_name: Brain-Computer Interfaces
  publisher: 'Taylor & Francis'
  link: 'https://www.tandfonline.com/journals/tbci20'
  sub: BME
  ccf: none
  cas: 4区
  jcr: Q3
  impact_factor: 2.1
  oa: false
  note: 唯一以 Brain-Computer Interfaces 命名的专刊,主题最对口但影响因子/分区偏低、体量小。
  note_en: The only journal named specifically for Brain-Computer Interfaces; most topically on-point but small with a modest impact factor and quartile.

- id: biomedicalphysicse
  title: 'Biomedical Physics & Engineering Express'
  full_name: 'Biomedical Physics & Engineering Express'
  publisher: IOP
  link: 'https://iopscience.iop.org/journal/2057-1976'
  sub: BME
  ccf: none
  cas: 4区
  jcr: Q3
  impact_factor: 1.7
  oa: true
  note: IOP 旗下生物医学物理与工程 OA 刊(ISSN 2057-1976),是 IOP 神经工程旗舰刊 Journal of Neural Engineering(JNE)的姊妹刊;中科院工程/医学 4 区、JCR Q3,IF 约 1.6-1.8,门槛较低,适合 EEG/BCI 方法与器械类工程论文的稳妥落点。
  note_en: 'IOP biomedical physics & engineering OA journal (ISSN 2057-1976), sister title to IOP''s neural-engineering flagship Journal of Neural Engineering (JNE); CAS engineering/medicine tier 4, JCR Q3, IF ~1.6-1.8, lower bar, a safe home for EEG/BCI methods and device-engineering papers.'

# ════════ BCI · 神经科学 / 神经工程 ════════

- id: neuroimage
  title: NeuroImage
  full_name: NeuroImage
  publisher: Elsevier
  link: 'https://www.sciencedirect.com/journal/neuroimage'
  sub: BCI
  ccf: none
  cas: 2区 Top
  jcr: Q1
  impact_factor: 5.7
  oa: false
  note: 神经影像学旗舰刊,fMRI/EEG/MEG等多模态脑成像方法与认知神经科学;EEG源定位、脑网络分析类BCI研究常见去处
  note_en: Flagship neuroimaging journal covering fMRI/EEG/MEG methods and cognitive neuroscience; common venue for EEG source-localization and brain-network BCI work

- id: humanbrainmapping
  title: Human Brain Mapping
  full_name: Human Brain Mapping
  publisher: Wiley
  link: 'https://onlinelibrary.wiley.com/journal/10970193'
  sub: BCI
  ccf: none
  cas: 2区
  jcr: Q1
  impact_factor: 4
  oa: false
  note: OHBM学会刊,功能与结构脑成像、脑连接组学;偏认知与临床神经影像,EEG/fMRI联合分析相关
  note_en: OHBM society journal on functional/structural brain imaging and connectomics; relevant to EEG/fMRI joint analysis and cognitive-clinical neuroimaging

- id: clinicalneurophysi
  title: Clinical Neurophysiology
  full_name: Clinical Neurophysiology
  publisher: Elsevier
  link: 'https://www.sciencedirect.com/journal/clinical-neurophysiology'
  sub: BCI
  ccf: none
  cas: 2区
  jcr: Q1
  impact_factor: 3.6
  oa: false
  note: IFCN官方刊,临床神经电生理(EEG/EMG/诱发电位/TMS);EEG-BCI的临床转化与电生理机制研究对口
  note_en: Official IFCN journal on clinical neurophysiology (EEG/EMG/evoked potentials/TMS); fitting for clinical-translational and electrophysiological EEG-BCI studies

- id: frontiersinneurosc
  title: Frontiers in Neuroscience
  full_name: Frontiers in Neuroscience
  publisher: Frontiers
  link: 'https://www.frontiersin.org/journals/neuroscience'
  sub: BCI
  ccf: none
  cas: 3区
  jcr: Q2
  impact_factor: 3.2
  oa: true
  note: Frontiers 神经科学旗舰刊,医学大类 3 区,完全 OA,设有 Neural Technology / Brain-Computer Interfaces 专栏,EEG/BCI 方法与系统论文适配度高,审稿透明、周期中等。
  note_en: Frontiers flagship neuroscience journal, CAS medicine tier 3, fully OA, hosts a Neural Technology/BCI section; strong fit for EEG/BCI methods and systems papers, transparent peer review.

- id: cognitiveneurodyna
  title: Cognitive Neurodynamics
  full_name: Cognitive Neurodynamics
  publisher: Springer
  link: 'https://link.springer.com/journal/11571'
  sub: BCI
  ccf: none
  cas: 2区
  jcr: Q2
  impact_factor: 3.1
  oa: false
  note: 偏神经科学/神经动力学,关注EEG节律、神经计算与脑动力学,认知BCI神经机制研究的对口刊。
  note_en: Neuroscience/neurodynamics leaning; focuses on EEG rhythms, neural computation and brain dynamics, fitting cognitive-BCI mechanism studies.

- id: braintopography
  title: Brain Topography
  full_name: Brain Topography
  publisher: Springer
  link: 'https://link.springer.com/journal/10548'
  sub: BCI
  ccf: none
  cas: 3区
  jcr: Q2
  impact_factor: 2.9
  oa: false
  note: 专注脑电/脑磁地形图与功能神经成像方法;EEG源成像、连接性与认知映射,对EEG-BCI方法学友好
  note_en: Focused on EEG/MEG topography and functional neuroimaging methods; EEG source imaging, connectivity and cognitive mapping, friendly to EEG-BCI methodology

- id: brainsciences
  title: Brain Sciences
  full_name: Brain Sciences
  publisher: MDPI
  link: 'https://www.mdpi.com/journal/brainsci'
  sub: BCI
  ccf: none
  cas: 3区
  jcr: Q3
  impact_factor: 2.8
  oa: true
  note: MDPI 脑科学/神经科学 OA 刊,医学大类 3 区、神经科学小类 3 区,审稿约 1 个月,国人友好,EEG/BCI 认知与临床神经科学研究常见发表平台。
  note_en: MDPI brain/neuroscience OA journal, CAS medicine tier 3 (neuroscience subcat. 3), ~1 month review; common venue for EEG/BCI cognitive and clinical-neuroscience work.

- id: frontiersinhumanne
  title: Frontiers in Human Neuroscience
  full_name: Frontiers in Human Neuroscience
  publisher: Frontiers
  link: 'https://www.frontiersin.org/journals/human-neuroscience'
  sub: BCI
  ccf: none
  cas: 3区
  jcr: Q2
  impact_factor: 2.7
  oa: true
  note: Frontiers 人类神经科学 OA 刊,医学大类 3 区,长期是 EEG/BCI 范式(运动想象、P300、SSVEP)与神经反馈研究的核心去处,审稿周期中等。
  note_en: Frontiers human-neuroscience OA journal, CAS medicine tier 3; a core outlet for EEG/BCI paradigms (motor imagery, P300, SSVEP) and neurofeedback studies.

- id: frontiersinneuroin
  title: Frontiers in Neuroinformatics
  full_name: Frontiers in Neuroinformatics
  publisher: Frontiers
  link: 'https://www.frontiersin.org/journals/neuroinformatics'
  sub: BCI
  ccf: none
  cas: 3区
  jcr: Q2
  impact_factor: 2.5
  oa: true
  note: Frontiers 神经信息学 OA 刊,医学/计算交叉,适合 EEG 数据处理工具链、解码算法、开源软件与数据标准类 BCI 论文,体量较小、专业性强。
  note_en: Frontiers neuroinformatics OA journal at the medicine/computing interface; fits EEG pipelines, decoding algorithms, open-source tools and data-standard BCI papers; smaller, niche scope.
