# BCI Journals · 期刊数据文件 / data file
# ─────────────────────────────────────────────────────────────
# 滚动投稿期刊(全年可投,无截稿日)。字段 / fields:
#   title / full_name  期刊简称 / 全名
#   publisher          出版商
#   link               官网 URL
#   sub                方向: ML|DM|NC|CV|AC|SP|BME|BCI(沿用会议主题色)
#   ccf                CCF 推荐期刊目录等级(中国),none = 不在目录
#   cas                中科院分区(2025 升级版),如 1区 Top / 2区 / 3区 / 4区
#   jcr                JCR 分区 Q1–Q4
#   impact_factor      最新 JCR 影响因子(2024 JCR)
#   oa                 true = 完全开放获取(收 APC)
#   note / note_en     客观定位 + BCI/EEG 相关性(中 / 英)
# ─────────────────────────────────────────────────────────────
# 数据由多智能体并行核查 + 低置信度二次核实,以 letpub / 官网为准。
# 影响因子与分区逐年变动,投稿前请复核。
# ─────────────────────────────────────────────────────────────

