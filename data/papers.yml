    desc_en: 'A multi-scale temporal plus local-global spatial graph convolution network for EEG emotion recognition; a DBLP-indexed BIBM 2023 brain-signal decoding paper.'
  - title: 'CR-GAT: Consistency Regularization Enhanced Graph Attention Network for Semi-supervised EEG Emotion Recognition'
    group: '海外/中国研究组(IEEE BIBM 2022)'
    group_en: 'Research group (IEEE BIBM 2022)'
    year: 2022
    tag: 'INTL'
    desc: '一致性正则增强的图注意力网络,做半监督 EEG 情感识别,是 BIBM 上 EEG 脑网络解码的代表工作。'
    desc_en: 'A consistency-regularization-enhanced graph attention network for semi-supervised EEG emotion recognition, representative of EEG brain-network decoding at BIBM.'

isbi27:
  - title: 'Cross-sampling Rate Transfer Learning for Enhanced Raw EEG Deep Learning Classifier in Major Depressive Disorder Diagnosis'
    group: 'ISBI 2024 录用 (EEG 抑郁症诊断)'
    group_en: 'Accepted at ISBI 2024 (EEG depression diagnosis)'
    year: 2024
    tag: 'INTL'
    desc: '跨采样率迁移学习提升原始 EEG 深度分类器在重度抑郁症诊断上的性能, ISBI 上 EEG 临床解码代表工作。'
    desc_en: 'Uses cross-sampling-rate transfer learning to boost a raw-EEG deep classifier for major depressive disorder diagnosis, a representative EEG clinical-decoding work at ISBI.'

